<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --void:#060D09;--base:#080F0B;--layer:#0B1510;--raise:#0F1C14;
  --lift:#14231A;--panel:#192C20;
  --g1:#1A2E20;--g2:#243D2C;
  --t0:#E8F2EC;--t1:#A8C4B0;--t2:#607868;--t3:#374840;
  --acc:#2E9650;--acc2:#1E6635;--acc3:rgba(46,150,80,.14);
  --gold:#B89A6A;--hot:#C8382A;--warn:#B8841A;--ok:#2E9650;
  --mono:'JetBrains Mono',monospace;--cond:'Syne',sans-serif;--body:'Jost',sans-serif;
}
html,body{height:100%;background:var(--void);color:var(--t1);font-family:var(--body);font-size:14px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--base)}::-webkit-scrollbar-thumb{background:var(--g2)}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:var(--base);border-bottom:1px solid var(--g1);padding:10px 16px;display:flex;align-items:center;gap:10px}
.topbar-brand{font-family:var(--cond);font-size:15px;font-weight:800;color:var(--t0);white-space:nowrap}
.topbar-brand span{color:var(--acc)}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.topbar-link{font-family:var(--mono);font-size:10px;color:var(--t3);text-decoration:none;padding:5px 10px;border:1px solid var(--g1);border-radius:4px}
.topbar-link:hover{color:var(--acc);border-color:var(--acc)}
.tb-btn{font-family:var(--mono);font-size:10px;color:var(--t2);text-decoration:none;padding:5px 10px;border:1px solid var(--g1);border-radius:4px;white-space:nowrap}
.tb-btn:hover{color:var(--acc);border-color:var(--acc)}

/* CONTROLS */
.controls{padding:12px 16px;background:var(--layer);border-bottom:1px solid var(--g1);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.ctrl-select{flex:1;min-width:120px;background:var(--raise);border:1px solid var(--g1);color:var(--t0);padding:8px 10px;border-radius:6px;font-family:var(--mono);font-size:11px;outline:none}
.ctrl-select:focus{border-color:var(--acc)}

/* REPORT GRID */
.content{padding:16px;overflow-y:auto}
.sec-label{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;padding:8px 0 6px}
.rel-grid{display:flex;flex-direction:column;gap:2px;margin-bottom:16px}
.rel-btn{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--layer);border:none;border-left:3px solid transparent;cursor:pointer;transition:all .15s;text-align:left;color:var(--t1);width:100%;border-radius:0}
.rel-btn:hover,.rel-btn:active{background:var(--raise);border-left-color:var(--acc)}
.rel-btn.generating{opacity:.5;pointer-events:none}
.rel-ico{font-size:18px;flex-shrink:0;width:28px;text-align:center}
.rel-txt{flex:1;min-width:0}
.rel-nm{font-size:13px;font-weight:600;color:var(--t0)}
.rel-ds{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:1px}
.rel-arrow{font-family:var(--mono);font-size:10px;color:var(--t3)}

/* PREVIEW */
.preview-wrap{position:fixed;inset:0;z-index:100;background:var(--void);display:none;flex-direction:column}
.preview-wrap.show{display:flex}
.preview-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--base);border-bottom:1px solid var(--g1);flex-shrink:0}
.preview-bar-title{flex:1;font-family:var(--cond);font-size:12px;font-weight:700;color:var(--t0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbtn{background:var(--raise);color:var(--t1);border:1px solid var(--g1);border-radius:4px;padding:6px 10px;font-family:var(--mono);font-size:10px;cursor:pointer}
.pbtn:hover{border-color:var(--acc);color:var(--acc)}
.pbtn-close{background:none;border:none;color:var(--t2);font-size:18px;cursor:pointer;padding:4px 8px}
.preview-frame{flex:1;overflow:auto;background:#fff}
.preview-frame iframe{width:100%;min-height:100%;border:none}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--acc);color:#fff;font-family:var(--mono);font-size:11px;font-weight:600;padding:8px 20px;border-radius:4px;opacity:0;transition:all .3s;z-index:200;pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{background:var(--hot)}.toast.info{background:var(--warn)}

/* NO OBRA */
.no-obra{text-align:center;padding:60px 20px;color:var(--t3)}
.no-obra h2{font-family:var(--cond);font-size:18px;font-weight:800;color:var(--t0);margin-bottom:8px}
.no-obra p{font-family:var(--mono);font-size:11px;line-height:1.6}
</style>

<script>

// ═══ HELPERS ═══
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function esc2(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtNum(n){ return Number(n||0).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtDate(s){ if(!s) return ''; if(s.includes('-')){ var p=s.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; } return s; }
function fmtDateShort(d){ return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0'); }
function fmtDateNum(s){ return fmtDate(s)||'—'; }
function today(){ var d=new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); }
function slugify(s){ return s.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'').replace(/-{2,}/g,'-').slice(0,80); }
function getSyncScript(){ return ''; }

// ═══ PALETAS + MODELOS (copiados do cockpit) ═══

  verde_berti: { name:'Verde Berti',primary:'#0D2016',accent:'#C4922A',accent2:'#D4A843',gold:'#C4922A',bg:'#F7F5F1',surface:'#FFFFFF',border:'#E5E0D8',ink:'#1E2230',muted:'#6B7280',danger:'#9B2226' },
  verde_vivo:  { name:'Verde Vivo',primary:'#0D2016',accent:'#2E6645',accent2:'#3D7A57',gold:'#B89A6A',bg:'#F7F5F1',surface:'#FFFFFF',border:'#E5E0D8',ink:'#1E2230',muted:'#6B7280',danger:'#9B2226' },

  ardosia:     { name:'Ardósia',primary:'#1A2332',accent:'#4A6785',accent2:'#5B7A9A',gold:'#D4A843',bg:'#F2F4F7',surface:'#FFFFFF',border:'#CDD2DA',ink:'#1A2332',muted:'#607080',danger:'#C0392B' },

  antracita:   { name:'Antracita Ouro',primary:'#1C1C1E',accent:'#C4922A',accent2:'#D4A843',gold:'#C4922A',bg:'#F5F5F5',surface:'#FFFFFF',border:'#E0E0E0',ink:'#1C1C1E',muted:'#737373',danger:'#B71C1C' },
  cinza:       { name:'Cinza Executivo',primary:'#111111',accent:'#444444',accent2:'#666666',gold:'#9B7940',bg:'#F4F4F4',surface:'#FFFFFF',border:'#CCCCCC',ink:'#111111',muted:'#777777',danger:'#CC2222' }
};
var MODELOS = {

  contemporaneo:  { name:'Contemporâneo',radius:'6px',radiusLg:'10px',fontDisplay:"'Space Grotesk', sans-serif",fontBody:"'Inter', sans-serif" },
  artistico:      { name:'Artístico',radius:'12px',radiusLg:'18px',fontDisplay:"'Playfair Display', serif",fontBody:"'DM Sans', sans-serif" }
};
var THEMES = {};
Object.keys(PALETAS).forEach(function(k){ THEMES[k] = PALETAS[k]; });
THEMES.verde = THEMES.verde_berti;

function calcPctGeral(){
  var srvs = state.servicos||[];
  if(!srvs.length) return 0;
  var totalVal = srvs.reduce(function(a,s){return a+(s.valor||0);},0);
  if(totalVal>0) return Math.round(srvs.reduce(function(a,s){return a+(s.pct_atual||0)*(s.valor||0);},0)/totalVal);
  return Math.round(srvs.reduce(function(a,s){return a+(s.pct_atual||0);},0)/srvs.length);
}

var _tt;
function toast(m,t){
  clearTimeout(_tt);var el=document.getElementById('toast');
  el.textContent=m;
  el.className='toast show'+(t==='err'?' err':t==='info'?' info':'');
  _tt=setTimeout(function(){el.className='toast';},3500);
}

var DIAS_SEMANA = ['seg','ter','qua','qui','sex','sab','dom'];
var DIAS_LABELS = { seg:'SEG', ter:'TER', qua:'QUA', qui:'QUI', sex:'SEX', sab:'SÁB', dom:'DOM' };
function getDiasData(offset){
  var c=state.config||{};var base=c.periodo_ini;if(!base)return{};
  var d=new Date((base.includes('/')?base.split('/').reverse().join('-'):base)+'T12:00:00');
  if(isNaN(d))return{};d.setDate(d.getDate()+(offset||0)*7);var r={};
  DIAS_SEMANA.forEach(function(dia,i){var dd=new Date(d);dd.setDate(d.getDate()+i);r[dia]=String(dd.getDate()).padStart(2,'0')+'/'+String(dd.getMonth()+1).padStart(2,'0');});
  return r;
}

// ═══ OBRA SELECTOR ═══
function carregarObras(){
  var sel = document.getElementById('sel-obra');
  var keys = Object.keys(localStorage).filter(function(k){ return k.startsWith('cockpit_') && !k.startsWith('cockpit_sync_'); });

  if(keys.length){
    _popularObrasSelect(keys);
    return;
  }

  // Sem dados locais — tentar Supabase como fallback
  sel.innerHTML = '<option value="">Buscando na nuvem...</option>';
  _carregarObrasSupabase();
}

function _popularObrasSelect(keys){
  var sel = document.getElementById('sel-obra');
  var opts = '';
  keys.forEach(function(k){
    try{
      var d = JSON.parse(localStorage.getItem(k));
      var nome = (d&&d.config&&d.config.obra) || k.replace('cockpit_','');
      opts += '<option value="'+k+'">'+esc(nome)+'</option>';
    }catch(e){
      opts += '<option value="'+k+'">'+k+'</option>';
    }
  });
  sel.innerHTML = opts;
  _carregarObraKey(keys[0]);
}

// v49 — Fallback: lê do Supabase quando localStorage está vazio (outro dispositivo)
async function _carregarObrasSupabase(){
  try{
    var resp = await fetch(SUPA_URL+'/rest/v1/cockpit_obras?select=obra_key,data,updated_at&order=updated_at.desc&limit=20', {
      headers: { 'apikey':SUPA_KEY, 'Authorization':'Bearer '+SUPA_KEY }
    });
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    var rows = await resp.json();
    if(!rows || !rows.length){
      document.getElementById('sel-obra').innerHTML = '<option value="">Nenhuma obra na nuvem</option>';
      document.getElementById('content').innerHTML = '<div class="no-obra"><h2>Nenhuma obra</h2><p>Abra o Cockpit e configure uma obra primeiro.</p></div>';
      return;
    }
    // Salvar no localStorage para usar localmente
    var keys = [];
    rows.forEach(function(row){
      var key = 'cockpit_'+row.obra_key;
      var data = typeof row.data === 'string' ? JSON.parse(row.data) : (row.data||{});
      data._savedAt = row.updated_at;
      localStorage.setItem(key, JSON.stringify(data));
      keys.push(key);
    });
    _popularObrasSelect(keys);
    toast('✓ '+rows.length+' obra(s) carregada(s) do Supabase','');
  }catch(e){
    document.getElementById('sel-obra').innerHTML = '<option value="">Erro: '+esc(e.message)+'</option>';
    document.getElementById('content').innerHTML = '<div class="no-obra"><h2>Sem conexão</h2><p>Não foi possível ler do Supabase.<br>Abra o Cockpit neste dispositivo primeiro.</p></div>';
  }
}

function trocarObra(){
  var sel = document.getElementById('sel-obra');
  if(sel.value) _carregarObraKey(sel.value);
}

function _carregarObraKey(key){
  try{
    var raw = localStorage.getItem(key);
    if(!raw){ toast('Obra não encontrada','err'); return; }
    state = JSON.parse(raw);
    currentObraKey = key;
    if(!state.config) state.config = {};
    if(!state.servicos) state.servicos = [];
    if(!state.pagamentos) state.pagamentos = [];
    if(!state.fotos) state.fotos = [];
    if(!state.pendencias) state.pendencias = [];
    if(!state.equipes) state.equipes = [];
    if(!state.snapshots) state.snapshots = {};
    if(!state.diario) state.diario = {};
    // v49 — Semana auto-calculada
    state.config.semana = _calcSemanaReal();
    _popularSemanas();
    _updateSyncStatus();
    toast('✓ '+(state.config.obra||key)+' · Sem '+state.config.semana+' · '+state.servicos.length+' serviços','');
  }catch(e){ toast('Erro: '+e.message,'err'); }
}

function _updateSyncStatus(){
  var el = document.getElementById('sync-status');
  if(!el) return;
  if(!state._savedAt){ el.textContent = '⚠ sem timestamp'; return; }
  var d = new Date(state._savedAt);
  var agora = new Date();
  var diffMin = Math.round((agora - d) / 60000);
  var label = diffMin < 1 ? 'agora' : diffMin < 60 ? diffMin+'min atrás' : Math.round(diffMin/60)+'h atrás';
  el.textContent = '● sync '+label;
  el.style.color = diffMin < 5 ? 'var(--acc)' : diffMin < 30 ? 'var(--warn)' : 'var(--hot)';
}

function _popularSemanas(){
  var sel = document.getElementById('sel-semana');
  var semReal = _calcSemanaReal();
  var snaps = state.snapshots||{};
  var h = '';
  // Semana atual primeiro
  var rangeAtual = _calcSemanaRange(semReal);
  h += '<option value="'+semReal+'">Semana '+semReal+' (atual · '+rangeAtual.iniLabel+' a '+rangeAtual.fimLabel+')</option>';
  // Semanas anteriores
  for(var i=semReal-1;i>=1;i--){
    var s=snaps['S'+i];
    var range = _calcSemanaRange(i);
    var extra = range.iniLabel+' a '+range.fimLabel;
    if(s) extra += ' · '+(s.pctGeral||0)+'%';
    h+='<option value="'+i+'">Semana '+i+' · '+extra+'</option>';
  }
  sel.innerHTML = h;
}

// Calcula semana real pela data de início da obra
function _calcSemanaReal(){
  var c = state.config||{};
  var ini = c.periodo_ini||'';
  if(!ini) return c.semana||1;
  var iniDate = new Date((ini.includes('/')?ini.split('/').reverse().join('-'):ini)+'T00:00:00');
  if(isNaN(iniDate)) return c.semana||1;
  var hoje = new Date(); hoje.setHours(0,0,0,0);
  var diff = Math.floor((hoje - iniDate) / (7*86400000));
  return Math.max(1, diff + 1); // semana 1 = primeira semana
}

// Busca narrativa/diário de uma semana arquivada
function _getNarrativaSemana(semNum){
  // 1. Tentar diario_historico (arquivado ao avançar semana)
  var hist = (state.diario_historico||{})['S'+semNum];
  if(hist && hist.dias){
    var DIAS = ['seg','ter','qua','qui','sex','sab','dom'];
    var DLBL = {seg:'SEG',ter:'TER',qua:'QUA',qui:'QUI',sex:'SEX',sab:'SÁB',dom:'DOM'};
    var textos = DIAS.map(function(d){
      var entry = hist.dias[d];
      if(!entry || !entry.texto || !entry.texto.trim()) return null;
      return (DLBL[d]||d.toUpperCase()) + ': ' + entry.texto.trim();
    }).filter(Boolean);
    if(textos.length) return textos.join('\n');
  }
  // 2. Tentar snapshot
  var snap = (state.snapshots||{})['S'+semNum];
  if(snap && snap.narrativa) return snap.narrativa;
  // 3. Tentar visitas
  var visitas = (state.visitas||[]).filter(function(v){ return v.semana === semNum; });
  if(visitas.length){
    var ultima = visitas[visitas.length-1];
    if(ultima.narrativa_revisada) return ultima.narrativa_revisada;
  }
  return '';
}

// Calcula range de datas de uma semana específica
function _calcSemanaRange(semNum){
  var c = state.config||{};
  var ini = c.periodo_ini||'';
  if(!ini) return {ini:null,fim:null,iniLabel:'—',fimLabel:'—',iniISO:'',fimISO:''};
  var iniDate = new Date((ini.includes('/')?ini.split('/').reverse().join('-'):ini)+'T00:00:00');
  if(isNaN(iniDate)) return {ini:null,fim:null,iniLabel:'—',fimLabel:'—',iniISO:'',fimISO:''};
  var semIni = new Date(iniDate); semIni.setDate(semIni.getDate() + (semNum-1)*7);
  var semFim = new Date(semIni);   semFim.setDate(semFim.getDate() + 6);
  return {
    ini: semIni,
    fim: semFim,
    iniISO: semIni.toISOString().slice(0,10),
    fimISO: semFim.toISOString().slice(0,10),
    iniLabel: String(semIni.getDate()).padStart(2,'0')+'/'+String(semIni.getMonth()+1).padStart(2,'0'),
    fimLabel: String(semFim.getDate()).padStart(2,'0')+'/'+String(semFim.getMonth()+1).padStart(2,'0')
  };
}

// v49 — Re-lê state FRESCO do localStorage (flush do cockpit)
function _reloadState(){
  if(!currentObraKey) return;
  try{
    var raw = localStorage.getItem(currentObraKey);
    if(!raw) return;
    var fresh = JSON.parse(raw);
    // Verificar se é mais novo que o state em memória
    var tsMemoria = state._savedAt ? new Date(state._savedAt).getTime() : 0;
    var tsFresh = fresh._savedAt ? new Date(fresh._savedAt).getTime() : 0;
    if(tsFresh > tsMemoria || tsFresh === 0){
      state = fresh;
      if(!state.config) state.config = {};
      if(!state.servicos) state.servicos = [];
      if(!state.pagamentos) state.pagamentos = [];
      if(!state.fotos) state.fotos = [];
      if(!state.pendencias) state.pendencias = [];
      if(!state.equipes) state.equipes = [];
      if(!state.snapshots) state.snapshots = {};
      if(!state.diario) state.diario = {};
      // Recalcular semana
      state.config.semana = _calcSemanaReal();
      _popularSemanas();
      _updateSyncStatus();
    }
  }catch(e){ console.warn('_reloadState error:', e); }
}

function _lastSyncLabel(){
  if(!state._savedAt) return 'dados locais';
  var d = new Date(state._savedAt);
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
}

async function callClaude(opts){
  var body={model:'claude-sonnet-4-20250514',max_tokens:opts.max_tokens||2000,messages:opts.messages};
  if(opts.system)body.system=opts.system;
  try{
    var ctrl=new AbortController();var timer=setTimeout(function(){ctrl.abort();},45000);
    var resp=await fetch(CF_WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal:ctrl.signal});
    clearTimeout(timer);var data=await resp.json();
    if(resp.ok&&data.content) return data.content.map(function(b){return b.text||'';}).join('').trim();
    throw new Error('Worker HTTP '+resp.status);
  }catch(e){
    if(e.name==='AbortError')throw new Error('Timeout 45s');
    throw e;
  }
}

function _autoTituloFoto(f){
  if(f.titulo_rel && f.titulo_rel !== f.data) return f.titulo_rel;
  if(f.servico_ref) return _gerarTituloPadrao(f);
  if(f.legenda && f.legenda !== 'Sem legenda') return f.legenda;
  var srvs = state.servicos || [];
  if(f.data && srvs.length){
    var fotoData = f.data.includes('/') ? f.data.split('/').reverse().join('-') : f.data;
    var emAndNaData = srvs.filter(function(s){
      var pct = s.pct_atual||0;
      if(pct<=0) return false;
      var ini = s.data_inicio||''; var fim = s.data_fim||'';
      return ini && fim && fotoData >= ini && fotoData <= fim;
    });
    if(emAndNaData.length){
      return emAndNaData.slice(0,2).map(function(s){ return (s.descricao||'').replace(/\s*[-—]\s*Salão\s*\d+/i,''); }).join(' / ');
    }
  }
  return '';
}
function _gerarTituloPadrao(f){
  if(!f.servico_ref) return f.legenda || '';
  var srv = (state.servicos||[]).find(function(s){ return s.cod === f.servico_ref; });
  if(!srv) return f.legenda || '';
  var desc = (srv.descricao||'').replace(/^SRV-\d+\s*[-—]\s*/i,'');
  return desc + (f.ambiente && f.ambiente !== 'Geral' ? ' — '+f.ambiente : '');
}

function _statusBadge(s){
  var pct = s.pct_atual||0;
  if(pct>=100) return '<span class="bdg bg">Concluído</span>';
  if(pct>0) return '<span class="bdg bb">Em andamento</span>';
  return '<span class="bdg bc">A executar</span>';
}
function _statusText(s){
  var pct = s.pct_atual||0;
  if(pct>=100) return 'CONCLUÍDO';
  if(pct>0) return 'EM ANDAMENTO';
  return 'A EXECUTAR';
}

function buildBertiHeader(opts) {
  const {tipo, obra, end, campos} = opts;
  // campos: array de {l, v, s?} — label, value, sub
  const campoDivs = campos.map((c,i) => {
    const sep = i < campos.length - 1 ? '<div class="cc-sep"></div>' : '';
    return `<div class="cc">
      <div class="cc-l">${esc2(c.l)}</div>
      <div class="cc-v">${c.v}</div>
      ${c.s ? `<div class="cc-s">${esc2(c.s)}</div>` : ''}
    </div>${sep}`;
  }).join('');
  return `<div class="cab">
    <div class="cab-esq">
      <div class="cab-top"><div class="marca">BERTI<span>.</span></div></div>
      <div class="cab-sep"></div>
      <div class="cab-bot">
        <div class="cab-tipo">${esc2(tipo)}</div>
        <div class="cab-obra">${esc2(obra)}</div>
        <div class="cab-end">${end}</div>
      </div>
    </div>
    <div class="cab-div"></div>
    <div class="cab-dir">${campoDivs}</div>
  </div>`;
}

function abrirRelatorioFotografico(){
  const c = state.config;
  const t = getRelTema();
  const p1 = t.p1, p2 = t.p2;
  const pi = c.periodo_ini ? fmtDate(c.periodo_ini) : '';
  const pf = c.periodo_fim ? fmtDate(c.periodo_fim) : '';
  const periodo = pi && pf ? `${pi} a ${pf}` : (pi||'—');
  const fotos = state.fotos || [];
  const semana = c.semana || 1;

  // v48 — _autoTituloFoto agora é global (definida junto com _gerarTituloPadrao)
  const srvs = state.servicos || [];

  // v48 — Agrupamento: serviço vinculado > ambiente > 'Geral'
  const grupos = {};
  fotos.forEach(f => {
    let k = 'Geral';
    if(f.servico_ref){
      const srv = srvs.find(s=>s.cod===f.servico_ref);
      if(srv) k = srv.descricao || srv.categoria || f.servico_ref;
    } else if(f.ambiente && f.ambiente !== 'Geral'){
      k = f.ambiente;
    } else if(f.grupo){
      k = f.grupo;
    }
    (grupos[k] = grupos[k]||[]).push(f);
  });

  // Ordenar grupos: serviços vinculados primeiro, 'Geral' por último
  const grupoKeys = Object.keys(grupos).sort((a,b) => {
    if(a === 'Geral') return 1;
    if(b === 'Geral') return -1;
    return 0;
  });

  const fotosHtml = grupoKeys.length ? grupoKeys.map(grp => {
    const fts = grupos[grp];
    return `
    <div style="break-inside:avoid;margin-bottom:28px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;border-bottom:2px solid var(--preto);padding-bottom:5px">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.5px">${esc2(grp)}</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--cinza)">${fts.length} foto${fts.length!==1?'s':''}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${fts.map(f => {
          const titulo = _autoTituloFoto(f);
          return `
        <div style="border:1px solid var(--linha);break-inside:avoid">
          ${f.url||f.src
            ? `<img src="${f.url||f.src}" style="width:100%;aspect-ratio:4/3;object-fit:cover;display:block" onerror="this.style.background='#ddd';this.style.aspectRatio='4/3'">`
            : `<div style="width:100%;aspect-ratio:4/3;background:#2A3A2A;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,.2)">FOTO</div>`}
          <div style="padding:7px 10px;background:var(--fundo);border-top:1px solid var(--linha)">
            ${titulo ? `<div style="font-size:11px;font-weight:700;color:var(--preto);margin-bottom:1px">${esc2(titulo)}</div>` : ''}
            <div style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--cinza)">${esc2(f.ambiente||grp)}${f.data?' · '+esc2(f.data):''}</div>
          </div>
        </div>`;
        }).join('')}
      </div>
    </div>`; }).join('')
  : `<div style="padding:40px;text-align:center;color:var(--cinza);border:1px solid var(--linha);font-size:13px">Nenhuma foto registrada para esta semana.</div>`;

  const cabHeader = buildBertiHeader({
    tipo: 'Registro Fotográfico de Obra',
    obra: c.obra || 'Obra',
    end: esc2(c.endereco_obra || ''),
    campos: [
      {l:'Contratante', v: esc2(c.razao_cliente||c.cliente||'—'), s: c.cnpj_cliente?`CNPJ ${esc2(c.cnpj_cliente)}`:''},
      {l:'Semana', v: `Semana ${semana} / ${c.medicoes||7}`},
      {l:'Período', v: periodo},
      {l:'Total de fotos', v: `${fotos.length} foto${fotos.length!==1?'s':''} · ${grupoKeys.length} grupo${grupoKeys.length!==1?'s':''}`}
    ]
  });

  const body = `${getBertiCSS(p1,p2)}<body>
<div class="doc">
${cabHeader}
<div class="corpo" style="padding:24px 32px 48px">
  ${fotosHtml}
</div>
<div class="rdp">
  <div class="rdp-l">${esc2(c.empresa||'Berti Construtora LTDA')} · ${esc2(c.email_empresa||'')}</div>
  <div class="rdp-c">Registro Fotográfico — ${esc2(c.obra||'')}</div>
  <div class="rdp-r">${today()} · Semana ${semana}</div>
</div>
</div>
</body>`;

  abrirModalRel(`Registro Fotográfico — Semana ${semana}`, body);
}

function _gerarGanttPDF(modo){
  var modalEl = document.getElementById('modal-gantt-periodo');
  if(modalEl) modalEl.remove();

  var c = state.config;
  var t = getRelTema();
  var p1 = t.p1, p2 = t.p2;
  var hideConcluido = document.getElementById('gantt-pdf-hide-concluido') && document.getElementById('gantt-pdf-hide-concluido').checked;
  var srvs = (state.servicos || []).filter(function(s){
    if(hideConcluido && (s.pct_atual||0)>=100) return false;
    return true;
  });

  function _toD(s){ if(!s) return null; var d=new Date(s.includes('/')?s.split('/').reverse().join('-'):s); return isNaN(d)?null:d; }

  // Calcular range de datas baseado no modo
  var hoje = new Date(); hoje.setHours(0,0,0,0);
  var dow = hoje.getDay();
  var diffSeg = dow===0?-6:1-dow;
  var rangeIni, rangeFim, periodoLabel;

  if(modo==='semana'){
    rangeIni = new Date(hoje); rangeIni.setDate(hoje.getDate()+diffSeg);
    rangeFim = new Date(rangeIni); rangeFim.setDate(rangeIni.getDate()+6);
    periodoLabel = 'Semana atual';
  } else if(modo==='2semanas'){
    rangeIni = new Date(hoje); rangeIni.setDate(hoje.getDate()+diffSeg);
    rangeFim = new Date(rangeIni); rangeFim.setDate(rangeIni.getDate()+13);
    periodoLabel = 'Próximas 2 semanas';
  } else if(modo==='mes'){
    rangeIni = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
    rangeFim = new Date(hoje.getFullYear(), hoje.getMonth()+1, 0);
    periodoLabel = rangeIni.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  } else {
    // Completo — usar datas dos serviços
    var allInis = srvs.map(function(s){return _toD(s.data_inicio);}).filter(Boolean);
    var allFins = srvs.map(function(s){return _toD(s.data_fim);}).filter(Boolean);
    rangeIni = allInis.length ? new Date(Math.min.apply(null,allInis)) : new Date();
    rangeFim = allFins.length ? new Date(Math.max.apply(null,allFins)) : new Date();
    var pi = c.periodo_ini ? fmtDate(c.periodo_ini) : '';
    var pf = c.periodo_fim ? fmtDate(c.periodo_fim) : '';
    periodoLabel = pi&&pf ? pi+' a '+pf : 'Completo';
  }
  rangeIni.setHours(0,0,0,0); rangeFim.setHours(0,0,0,0);

  // Filtrar serviços que têm atividade no período (exceto completo)
  var srvFiltrados;
  if(modo==='completo'){
    srvFiltrados = srvs.slice();
  } else {
    srvFiltrados = srvs.filter(function(s){
      var ini = _toD(s.data_inicio);
      var fim = _toD(s.data_fim) || ini;
      if(!ini) return false;
      return ini<=rangeFim && fim>=rangeIni;
    });
  }

  // Sort by execution date
  srvFiltrados.sort(function(a,b){
    var da = a.dias_marcados&&a.dias_marcados.length ? a.dias_marcados[0] : (a.data_inicio||'9999');
    var db = b.dias_marcados&&b.dias_marcados.length ? b.dias_marcados[0] : (b.data_inicio||'9999');
    if(da.includes('/')) da=da.split('/').reverse().join('-');
    if(db.includes('/')) db=db.split('/').reverse().join('-');
    return da<db?-1:da>db?1:0;
  });

  var srvComDatas = srvFiltrados.filter(function(s){return s.data_inicio;});
  var srvSemDatas = srvFiltrados.filter(function(s){return !s.data_inicio;});
  // rangeIni e rangeFim já definidos pelo modo selecionado
  rangeIni.setHours(0,0,0,0); rangeFim.setHours(0,0,0,0);

  // Build days array
  var dias = [];
  var cur = new Date(rangeIni);
  while(cur <= rangeFim){ dias.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
  if(!dias.length) dias.push(new Date());

  var todayD = new Date(); todayD.setHours(0,0,0,0);
  var dowLetras = ['D','S','T','Q','Q','S','S'];

  // Month spans for header
  var meses = [];
  var prevMon = -1;
  dias.forEach(function(d,i){
    var m = d.getMonth();
    if(m !== prevMon){ meses.push({label:d.toLocaleDateString('pt-BR',{month:'short'}).toUpperCase(), start:i, count:0}); prevMon=m; }
    meses[meses.length-1].count++;
  });

  // Day header row
  var dayHeaders = dias.map(function(d){
    var isToday = d.getTime() === todayD.getTime();
    var isWeekend = d.getDay()===0 || d.getDay()===6;
    var isSunday = d.getDay()===0;
    var bg = isToday ? p1 : isWeekend ? '#EEEEEE' : '#FAFAFA';
    var clr = isToday ? '#fff' : isWeekend ? '#888' : '#AAA';
    var borderL = isSunday ? 'border-left:1px solid #BDBDBD' : 'border-left:1px solid #E8E8E8';
    return '<th style="min-width:22px;max-width:22px;padding:2px 1px;text-align:center;font-size:7px;font-weight:600;background:'+bg+';color:'+clr+';'+borderL+';border-bottom:1.5px solid #BDBDBD;line-height:1.2">'+dowLetras[d.getDay()]+'<br>'+d.getDate()+'</th>';
  }).join('');

  // Month header row
  var monHeaders = meses.map(function(m){
    return '<th colspan="'+m.count+'" style="padding:4px 4px;text-align:center;font-size:8px;font-weight:700;color:#666;background:#F5F5F5;border-left:1px solid #BDBDBD;border-bottom:1px solid #E0E0E0;letter-spacing:.5px">'+m.label+'</th>';
  }).join('');

  // Status colors
  var stColors = {'CONCLUÍDO':'#065F46','EM ANDAMENTO':p2,'A EXECUTAR':'#D1D5DB','PAUSADO':'#F59E0B','AGUARDANDO PROJETO':'#8B5CF6'};

  // Paleta pastel suave — mesma ordem das equipes do cockpit, tom leve e agradável
  // Cada cor é a versão pastel da cor forte do Gantt interativo, com boa distinção entre si
  var EQ_COLORS_PDF = [
    '#B2DFDB', // verde-menta suave   (EQ-ALV → #065F46)
    '#BBDEFB', // azul-céu claro      (EQ-ELE → #1D4ED8)
    '#D1C4E9', // lavanda suave       (EQ-PIN → #7C3AED)
    '#FFE0B2', // pêssego claro       (EQ-DRY → #B45309)
    '#FFCDD2', // rosa-salmão suave   (EQ-ACO → #DC2626)
    '#B2EBF2', // ciano-água claro    (EQ-HID → #0891B2)
    '#C5CAE9', // azul-lavanda suave  (EQ-VID → #4F46E5)
    '#A5D6A7', // verde-folha claro   (EQ-SER → #059669)
    '#FFF9C4', // amarelo-manteiga    (EQ-MAR → #D97706)
    '#E1BEE7', // lilás suave         (EQ-LIM → #9333EA)
    '#F8BBD0', // rosa-claro          (EQ-RVT → #E11D48)
    '#80CBC4'  // verde-turquesa      (EQ-OBR → #0D9488)
  ];
  // Cores de texto para contraste legível sobre cada pastel
  var EQ_COLORS_TEXT = [
    '#004D40', '#0D47A1', '#4A148C', '#E65100', '#B71C1C', '#006064',
    '#1A237E', '#1B5E20', '#F57F17', '#6A1B9A', '#880E4F', '#00695C'
  ];
  function _eqColorPDF(cod){
    var idx = (state.equipes||[]).findIndex(function(e){return e.cod===cod;});
    return idx >= 0 ? EQ_COLORS_PDF[idx % EQ_COLORS_PDF.length] : '#E0E0E0';
  }
  function _eqColorTextPDF(cod){
    var idx = (state.equipes||[]).findIndex(function(e){return e.cod===cod;});
    return idx >= 0 ? EQ_COLORS_TEXT[idx % EQ_COLORS_TEXT.length] : '#666';
  }

  var _rowIdx = 0;
  function srvRow(s){
    var ini = _toD(s.data_inicio);
    var fim = _toD(s.data_fim) || ini;
    var pct = s.pct_atual||0;
    var isAtrasado = fim && fim < todayD && pct < 100;
    // Cor da barra: pastel suave por equipe
    var barColor = isAtrasado ? '#EF9A9A' : _eqColorPDF(s.equipe);
    var rowBg = (_rowIdx % 2 === 0) ? '#fff' : '#FAFBFC';
    _rowIdx++;

    var cells = dias.map(function(d){
      var isToday = d.getTime() === todayD.getTime();
      var isWeekend = d.getDay()===0 || d.getDay()===6;
      var isSunday = d.getDay()===0;
      var dISO = d.toISOString().slice(0,10);
      var inRange = false;
      if(s.dias_marcados && s.dias_marcados.length){
        inRange = s.dias_marcados.indexOf(dISO) >= 0;
      } else {
        inRange = ini && fim && d >= ini && d <= fim;
      }
      var bg = inRange ? barColor : (isWeekend ? '#F7F6F3' : rowBg);
      var borderL = isToday ? 'border-left:2px solid '+p1+';border-right:2px solid '+p1 : (isSunday ? 'border-left:1px solid #BDBDBD' : 'border-left:1px solid #E8E8E8');
      return '<td style="padding:0;height:20px;'+borderL+';background:'+bg+'"></td>';
    }).join('');

    var stBadge = (function(){
      var st = _statusText(s);
      var bg2 = st==='CONCLUÍDO'?'#E8F5E9':st==='EM ANDAMENTO'?'#E3F2FD':st==='PAUSADO'?'#FFF8E1':'#F5F5F5';
      var clr2 = st==='CONCLUÍDO'?'#2E7D32':st==='EM ANDAMENTO'?'#1565C0':st==='PAUSADO'?'#F57F17':'#9E9E9E';
      return '<span style="display:inline-block;padding:2px 6px;font-size:7px;font-weight:600;background:'+bg2+';color:'+clr2+';border-radius:3px;text-transform:uppercase;letter-spacing:.3px">'+st+'</span>';
    })();

    // v48 — Nome da equipe limpo para o cliente (sem código)
    var eqObj = (state.equipes||[]).find(function(e){return e.cod===s.equipe;});
    var eqNomeCliente = eqObj ? esc2(eqObj.responsavel||eqObj.nome||eqObj.especialidade||'') : '';

    // v48 — Datas em texto para leitura direta
    var iniTxt = ini ? (String(ini.getDate()).padStart(2,'0')+'/'+String(ini.getMonth()+1).padStart(2,'0')) : '';
    var fimTxt = fim ? (String(fim.getDate()).padStart(2,'0')+'/'+String(fim.getMonth()+1).padStart(2,'0')) : '';
    var durDias = ini && fim ? Math.max(1, Math.round((fim-ini)/86400000)+1) : '';
    var periodoTxt = iniTxt ? (iniTxt+(fimTxt && fimTxt!==iniTxt ? ' — '+fimTxt : '')+((durDias && durDias > 1) ? ' · '+durDias+'d' : '')) : '—';

    return '<tr style="border-bottom:1px solid #E8E8E8;background:'+rowBg+'">'
      +'<td style="padding:5px 8px;min-width:200px;max-width:260px;word-wrap:break-word;white-space:normal;border-right:1px solid #E0E0E0;background:'+rowBg+'"><div style="font-size:10px;font-weight:600;color:#333;line-height:1.4">'+esc2(s.descricao)+'</div>'+(eqNomeCliente?'<div style="font-size:8px;color:#AAAAAA;margin-top:1px">'+eqNomeCliente+'</div>':'')+'</td>'
      +'<td style="padding:5px 6px;text-align:center;border-right:1px solid #E0E0E0;background:'+rowBg+';white-space:nowrap"><div style="font-family:monospace;font-size:8px;color:#777;line-height:1.3">'+periodoTxt+'</div></td>'
      +'<td style="padding:5px 6px;text-align:center;border-right:1px solid #E0E0E0;background:'+rowBg+'">'+stBadge+'</td>'
      +'<td style="padding:5px 6px;text-align:center;font-family:monospace;font-size:9px;font-weight:700;color:'+(pct>=100?'#2E7D32':'#555')+';border-right:1px solid #BDBDBD;background:'+rowBg+'">'+pct+'%</td>'
      +cells+'</tr>';
  }

  // Sort by execution date (same order as interactive Gantt)
  var allSorted = srvComDatas.slice().sort(function(a,b){
    var da = a.dias_marcados && a.dias_marcados.length ? a.dias_marcados[0] : (a.data_inicio||'9999');
    var db = b.dias_marcados && b.dias_marcados.length ? b.dias_marcados[0] : (b.data_inicio||'9999');
    if(da.includes('/')) da = da.split('/').reverse().join('-');
    if(db.includes('/')) db = db.split('/').reverse().join('-');
    return da < db ? -1 : da > db ? 1 : 0;
  });
  var tblBody = '';
  allSorted.forEach(function(s){ tblBody += srvRow(s); });
  if(srvSemDatas.length){
    tblBody += '<tr><td colspan="'+(4+dias.length)+'" style="padding:6px 8px;background:#EEEEEE;color:#888;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Sem data definida <span style="opacity:.5">('+srvSemDatas.length+')</span></td></tr>';
    srvSemDatas.forEach(function(s){ tblBody += srvRow(s); });
  }

  var cabHeader = buildBertiHeader({
    tipo: 'Cronograma Visual — Gantt · ' + periodoLabel,
    obra: c.obra || 'Obra',
    end: esc2(c.endereco_obra || ''),
    campos: [
      {l:'Contratante', v: esc2(c.razao_cliente||c.cliente||'—')},
      {l:'Período', v: periodoLabel + ' · ' + fmt(rangeIni) + ' a ' + fmt(rangeFim)},
      {l:'Serviços', v: srvFiltrados.length + ' de ' + srvs.length + ' · ' + srvFiltrados.filter(function(s){return _statusText(s)==='CONCLUÍDO';}).length + ' concluídos'},
      {l:'Gerado em', v: today()+' · '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}
    ]
  });
  function fmt(d){return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}

  var html = getBertiCSS(p1,p2)+`
  <style>
    .doc-body{padding:18px 22px 40px}
    .sec-hdr{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.8px;border-bottom:1.5px solid #BDBDBD;padding-bottom:6px;margin:18px 0 12px}
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
    .kpi{border:1px solid #E0E0E0;padding:12px 14px;border-radius:6px;background:#FAFAFA}
    .kpi-val{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:#444;line-height:1}
    .kpi-lbl{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
    @media print{body{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}.doc-body{padding:8px 12px}th,td{font-size:7px!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}}
  </style>
  <body>
  <div class="doc">
  ${cabHeader}
  <div class="doc-body">
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-val">${srvFiltrados.length}</div><div class="kpi-lbl">Serviços no período</div></div>
      <div class="kpi"><div class="kpi-val">${srvFiltrados.filter(function(s){return _statusText(s)==='CONCLUÍDO';}).length}</div><div class="kpi-lbl">Concluídos</div></div>
      <div class="kpi"><div class="kpi-val">${srvFiltrados.filter(function(s){return _statusText(s)==='EM ANDAMENTO';}).length}</div><div class="kpi-lbl">Em andamento</div></div>
      <div class="kpi"><div class="kpi-val">${Math.round(srvFiltrados.reduce(function(a,s){return a+(s.pct_atual||0);},0)/Math.max(1,srvFiltrados.length))}%</div><div class="kpi-lbl">Avanço médio</div></div>
    </div>
    <div class="sec-hdr">${periodoLabel} — ${dias.length} dias</div>
    <div style="overflow-x:auto">
      <table style="border-collapse:collapse;font-size:10px;width:max-content;border:1px solid #BDBDBD">
        <thead>
          <tr><th style="min-width:200px;border-bottom:1px solid #E0E0E0;background:#F5F5F5"></th><th style="min-width:80px;border-bottom:1px solid #E0E0E0;background:#F5F5F5"></th><th style="min-width:70px;border-bottom:1px solid #E0E0E0;background:#F5F5F5"></th><th style="min-width:40px;border-bottom:1px solid #E0E0E0;background:#F5F5F5"></th>${monHeaders}</tr>
          <tr><th style="padding:5px 8px;text-align:left;background:${p1};color:#fff;font-size:9px;font-weight:600;border-right:1px solid rgba(255,255,255,.15)">Serviço</th><th style="padding:5px 6px;text-align:center;background:${p1};color:#fff;font-size:9px;font-weight:600;border-right:1px solid rgba(255,255,255,.15)">Período</th><th style="padding:5px 6px;text-align:center;background:${p1};color:#fff;font-size:9px;font-weight:600;border-right:1px solid rgba(255,255,255,.15)">Status</th><th style="padding:5px 6px;text-align:center;background:${p1};color:#fff;font-size:9px;font-weight:600;border-right:1px solid #BDBDBD">%</th>${dayHeaders}</tr>
        </thead>
        <tbody>${tblBody}</tbody>
      </table>
    </div>
    <!-- Legenda por equipe -->
    <div style="display:flex;gap:12px;margin-top:16px;font-size:9px;color:#555;flex-wrap:wrap;padding:10px 12px;background:#FAFAFA;border-radius:8px;border:1px solid #E8E8E8">
      <span style="font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#999;margin-right:4px">Equipes:</span>
      ${(state.equipes||[]).map(function(eq,i){ return '<span style="display:inline-flex;align-items:center;gap:3px"><span style="display:inline-block;width:12px;height:12px;background:'+EQ_COLORS_PDF[i % EQ_COLORS_PDF.length]+';border-radius:3px;border:1px solid rgba(0,0,0,.06)"></span>'+esc2(eq.responsavel||eq.nome||eq.especialidade||eq.cod)+'</span>'; }).join('')}
      <span style="margin-left:8px;display:inline-flex;align-items:center;gap:3px"><span style="display:inline-block;width:12px;height:12px;background:#EF9A9A;border-radius:3px;border:1px solid rgba(0,0,0,.06)"></span>Atrasado</span>
      <span style="display:inline-flex;align-items:center;gap:3px"><span style="display:inline-block;width:12px;height:12px;background:${p1};border-radius:3px"></span>Hoje</span>
    </div>
  </div>
  </div>
  </body></html>`;

  _relCurrentHtml = html;
  _relCurrentTitle = 'Cronograma & Gantt — Semana '+(c.semana||1);
  abrirModalRel(_relCurrentTitle, html);
}

// RELATÓRIO SEMANAL INTERNO — padrão BERTI
// ═══════════════════════════════════════════════════════════════
function abrirRelatorioSemanal(){
  // Show week/date picker first
  const c = state.config;
  const semAtual = c.semana || 1;
  const dataHoje = today();

  const modal = document.createElement('div');
  modal.id = 'modal-rel-semana';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
  modal.innerHTML = `
    <div style="background:var(--surface);border-radius:12px;padding:20px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.4)">
      <div style="font-family:var(--font-display);font-size:15px;font-weight:800;color:var(--text);margin-bottom:12px">📄 Relatório Semanal Interno</div>
      <div class="field" style="margin-bottom:12px">
        <label>Semana</label>
        <input type="number" id="rel-sem-num" value="${semAtual}" min="1" style="width:100%">
      </div>
      <div class="field" style="margin-bottom:12px">
        <label>Data de referência</label>
        <input type="text" id="rel-sem-data" value="${dataHoje}" style="width:100%" placeholder="DD/MM/AAAA">
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.5">Serão exibidos apenas os serviços com mudança nesta semana (avanço ou status diferente do anterior).</div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button onclick="document.getElementById('modal-rel-semana').remove()" style="background:transparent;border:1.5px solid var(--border);border-radius:8px;padding:8px 16px;cursor:pointer;color:var(--muted)">Cancelar</button>
        <button onclick="_gerarRelSemanal()" style="background:var(--primary);color:#fff;border:none;border-radius:8px;padding:8px 20px;font-family:var(--font-display);font-weight:800;cursor:pointer">Gerar →</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

function _gerarRelSemanal(){
  const semNum = parseInt(document.getElementById('rel-sem-num').value)||1;
  const dataRef = document.getElementById('rel-sem-data').value || today();
  document.getElementById('modal-rel-semana').remove();

  const c = state.config;
  const t = getRelTema();
  const p1 = t.p1, p2 = t.p2;
  const pi = c.periodo_ini ? fmtDate(c.periodo_ini) : '';
  const pf = c.periodo_fim ? fmtDate(c.periodo_fim) : '';
  const periodo = pi && pf ? `${pi} a ${pf}` : (pi||'—');
  const srvs = state.servicos || [];
  const pags = state.pagamentos || [];
  const equipes = state.equipes || [];
  const pendencias = state.pendencias || [];
  const fotos = state.fotos || [];
  const narrativa = (function(){
    var _dk = ['seg','ter','qua','qui','sex','sab','dom'];
    var visitaSemana = (state.visitas||[]).filter(function(v){ return v.semana === semNum; });
    if(visitaSemana.length){
      var ultima = visitaSemana[visitaSemana.length - 1];
      if(ultima.narrativa_revisada) return ultima.narrativa_revisada;
    }
    var textos = _dk.map(function(d){
      var entry = (state.diario||{})[d];
      if(!entry || !entry.texto || !entry.texto.trim()) return null;
      var datas = getDiasData(0);
      return (DIAS_LABELS[d]||d.toUpperCase()) + ' ' + (datas[d]||'') + ':\n' + entry.texto.trim();
    }).filter(Boolean);
    if(textos.length) return textos.join('\n\n');
    return (document.getElementById('narrativa-visita')||{value:''}).value || state.narrativa || '';
  })();

  const totalSrv = srvs.length;
  const concluidos = srvs.filter(s=>s.status_atual==='CONCLUÍDO').length;  const emAnd = srvs.filter(s=>s.status_atual==='EM ANDAMENTO').length;
  const aExec = srvs.filter(s=>(s.pct_atual||0)===0).length;
  const pctGeral = calcPctGeral();

  const totalEnt = pags.filter(p=>p.tipo==='ENTRADA').reduce((a,p)=>a+(parseFloat(p.valor)||0),0);
  const totalSai = pags.filter(p=>p.tipo==='SAÍDA').reduce((a,p)=>a+(parseFloat(p.valor)||0),0);
  const saldo = totalEnt - totalSai;
  const taxaAdm = c.taxa_admin || 15;
  const valContrato = c.valor_contrato || 0;
  const lucroEst = saldo - (valContrato * taxaAdm / 100);

  // Serviços da semana (com avanço)
  const srvsemana = srvs.filter(s=>(s.pct_atual||0)>(s.pct_anterior||0)||s.status_atual!==s.status_anterior);
  const programados = srvs.filter(s=>s.status_anterior==='A EXECUTAR'||s.status_anterior==='EM ANDAMENTO');
  const aderencia = programados.length>0 ? Math.round((srvsemana.length/programados.length)*100) : 100;

  // Fotos agrupadas
  const grupos = {};
  fotos.forEach(f=>{const g=f.ambiente||f.grupo||'Geral';(grupos[g]=grupos[g]||[]).push(f);});

  // Alertas
  const alts = pendencias.filter(p=>p.status==='ABERTA').slice(0,6);

  // Equipe / presença — lê de state.diario com fallback para eq.presenca
  const _presKeys  = ['seg','ter','qua','qui','sex','sab','dom'];
  const _presLabel = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  const presRows = equipes.length ? equipes.map(eq=>{
    const dias = _presKeys.map(d=>{
      const diaEntry = (state.diario || {})[d];
      let pres = diaEntry && diaEntry.presenca && diaEntry.presenca[eq.cod];
      if(pres === undefined || pres === null) pres = eq.presenca && eq.presenca[d];
      const v = pres === true || pres === 'sim' ? 'sim' : pres === false || pres === 'nao' ? 'nao' : 'nd';
      const icon = v === 'sim' ? '✓' : v === 'nao' ? '✗' : '—';
      const cls  = v === 'sim' ? 'ck' : v === 'nao' ? 'cx' : 'dc';
      return `<td class="${cls}">${icon}</td>`;
    }).join('');
    const total = _presKeys.filter(d=>{
      const de = (state.diario||{})[d];
      let p = de && de.presenca && de.presenca[eq.cod];
      if(p === undefined || p === null) p = eq.presenca && eq.presenca[d];
      return p === true || p === 'sim';
    }).length;
    return `<tr><td style="font-weight:700">${esc2(eq.nome||eq.responsavel||'')}</td>${dias}<td class="mono" style="text-align:center;font-weight:700">${total}d</td></tr>`;
  }).join('') : `<tr><td colspan="9" style="color:var(--cinza);text-align:center;padding:16px">Sem equipes registradas</td></tr>`;

  // Serviços semana rows
  const srvRows = srvsemana.length ? srvsemana.map(s=>{
    const delta = (s.pct_atual||0)-(s.pct_anterior||0);
    const stAtual = _statusBadge(s);
    const stAnt  = (s.pct_anterior||0)>=100?'<span class="bdg bg">Concluído</span>':
                    (s.pct_anterior||0)>0?'<span class="bdg bb">Em andamento</span>':
                    '<span class="bdg bc">A executar</span>';
    return `<tr>
      <td class="mono" style="font-size:8px;color:var(--cinza)">${esc2(s.cod||'')}</td>
      <td style="font-weight:700">${esc2(s.descricao||'')}</td>
      <td>${stAnt}</td>
      <td>${stAtual}</td>
      <td class="mono" style="text-align:right;font-weight:700;color:var(--ok)">+${delta}%</td>
      <td class="mono" style="text-align:right;font-weight:700">${s.pct_atual||0}%</td>
    </tr>`;
  }).join('') : `<tr><td colspan="6" style="color:var(--cinza);text-align:center;padding:16px">Nenhum serviço com avanço registrado nesta semana</td></tr>`;

  // Alertas rows
  const altRows = alts.length ? alts.map(p=>{
    const tp = (p.tipo||'alerta').toLowerCase();
    const cls = tp.includes('venc')||tp.includes('pag') ? 'r' : tp.includes('dec')||tp.includes('mat') ? 'a' : 'b';
    return `<div class="al ${cls}"><div class="al-tp">${esc2(p.tipo||'Alerta')}</div><div class="al-txt"><strong>${esc2(p.titulo||'')}</strong>${p.descricao?' — '+esc2(p.descricao):''}</div></div>`;
  }).join('') : `<div style="padding:14px;color:var(--cinza);font-size:12px;text-align:center">Sem pendências abertas</div>`;

  // Fotos rows
  const fotosHtml = Object.keys(grupos).length ? Object.entries(grupos).map(([grp,fts])=>`
    <div class="grp">${esc2(grp)}</div>
    <div class="fgrid">${fts.slice(0,4).map(f=>`

<div class="doc">
${cabHeader}
<div class="kpi6">

</div>

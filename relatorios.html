<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${esc2(c.obra||'Obra')} — Acompanhamento</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--p1:${p1};--p2:${p2};--ink:#222;--sub:#888;--line:#E8E8E8;--bg:#FAFAFA}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
.wrap{max-width:960px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 0 60px rgba(0,0,0,.04)}

/* HEADER */
.hdr{background:var(--p1);padding:32px 32px 24px;position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.03)}
.hdr-brand{font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,.3);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(26px,4vw,36px);font-weight:900;color:#fff;line-height:1.05;letter-spacing:-.5px}
.hdr-meta{font-size:12px;color:rgba(255,255,255,.35);margin-top:6px;line-height:1.6}
.hdr-row{display:flex;align-items:center;gap:20px;margin-top:20px;padding-top:18px;border-top:1px solid rgba(255,255,255,.06)}
.hdr-kpis{display:flex;gap:24px;flex:1;flex-wrap:wrap}
.hdr-kv{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:#fff}
.hdr-kl{font-family:'IBM Plex Mono',monospace;font-size:8px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--line);background:#fff;position:sticky;top:0;z-index:10}
.tab{padding:12px 20px;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--p1);border-bottom-color:var(--p1);font-weight:700}

/* PANELS */
.panel{display:none;padding:28px 32px 40px;animation:fadeIn .3s}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.kpi-card{padding:16px;border:1px solid var(--line);border-radius:8px;background:#FAFAFA}
.kpi-card-v{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--p1);line-height:1}
.kpi-card-l{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

/* SECTION */
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--ink);text-transform:uppercase;letter-spacing:.5px;border-bottom:1.5px solid var(--line);padding-bottom:6px;margin-bottom:16px}

/* GANTT */
.gantt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:8px}
.gantt-wrap table{border-collapse:collapse;font-size:10px;width:max-content;border:1px solid #CCC}
.gantt-wrap th{position:sticky;top:0;z-index:2}
.gantt-legend{display:flex;gap:8px;flex-wrap:wrap;padding:10px 0;margin-top:12px}

/* FOTOS */
.foto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.foto-card{border-radius:8px;overflow:hidden;border:1px solid var(--line);background:#fff}
.foto-card img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
.foto-card-info{padding:6px 10px;font-size:10px;color:var(--sub)}

/* ORÇAMENTO TABLE */
.orc-table{width:100%;border-collapse:collapse}
.orc-table th{background:var(--p1);color:#fff;padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.8px;text-align:left}
.orc-table th:nth-child(3),.orc-table th:nth-child(4){text-align:right}
.orc-table td{padding:0}

/* LINKS */
.link-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.link-card{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1px solid var(--line);border-radius:8px;font-size:12px;font-weight:600;transition:background .15s}
.link-card:hover{background:#F5F5F5}

/* FOOTER */
.ftr{background:var(--p1);padding:28px 32px;text-align:center}
.ftr-brand{font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,.25);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.ftr-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:#fff;margin-bottom:4px}
.ftr-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.2);line-height:1.8}
.wa-btn{display:inline-flex;align-items:center;gap:7px;background:#25D366;color:#fff;padding:9px 20px;border-radius:8px;font-size:12px;font-weight:700;margin-top:14px}
.narr{font-size:13px;line-height:1.8;color:#444;border-left:3px solid var(--p1);padding:12px 16px;background:#FAFAFA;margin:16px 0}

@media(max-width:600px){
  .hdr{padding:24px 18px 20px}
  .hdr-row{flex-direction:column;align-items:flex-start;gap:12px}
  .panel{padding:20px 18px 32px}
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tab{padding:10px 14px;font-size:11px}
  .foto-grid{grid-template-columns:repeat(2,1fr)}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
}
@media print{
  body{background:#fff}
  .wrap{box-shadow:none}
  .tabs{position:static}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
}
</style>
</head>
<body>
<div class="wrap">
  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-brand">${esc2(c.empresa||'BERTI CONSTRUTORA')}</div>
    <div class="hdr-title">${esc2(c.obra||'Obra')}</div>
    <div class="hdr-meta">${esc2(c.razao_cliente||c.cliente||'')}${pi&&pf?' · '+pi+' a '+pf:''}${c.endereco_obra?'<br>'+esc2(c.endereco_obra):''}</div>
    <div class="hdr-row">
      ${ringBig}
      <div class="hdr-kpis">
        <div><div class="hdr-kv">${concluidos}/${totalSrv}</div><div class="hdr-kl">Serviços</div></div>
        <div><div class="hdr-kv">S${semana}</div><div class="hdr-kl">Semana</div></div>
        <div><div class="hdr-kv">${pctPago}%</div><div class="hdr-kl">Pago</div></div>
        <div><div class="hdr-kv">${emAnd}</div><div class="hdr-kl">Em andamento</div></div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs" id="portal-tabs">
    <div class="tab active" onclick="portalTab(0)">Resumo</div>
    <div class="tab" onclick="portalTab(1)">Cronograma</div>
    <div class="tab" onclick="portalTab(2)">Orçamento</div>
    ${fotosOk.length?'<div class="tab" onclick="portalTab(3)">Fotos</div>':''}
    ${links.length?'<div class="tab" onclick="portalTab('+(fotosOk.length?4:3)+')">Documentos</div>':''}
  </div>

  <!-- 01 RESUMO -->
  <div class="panel active" id="portal-panel-0">
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-card-v">${pctGeral}%</div><div class="kpi-card-l">Avanço geral</div></div>
      <div class="kpi-card"><div class="kpi-card-v">${concluidos}</div><div class="kpi-card-l">Concluídos</div></div>
      <div class="kpi-card"><div class="kpi-card-v">${emAnd}</div><div class="kpi-card-l">Em andamento</div></div>
      <div class="kpi-card"><div class="kpi-card-v">${aExec}</div><div class="kpi-card-l">A executar</div></div>
      <div class="kpi-card"><div class="kpi-card-v">R$ ${fmtNum(valContrato)}</div><div class="kpi-card-l">Contrato</div></div>
      <div class="kpi-card"><div class="kpi-card-v">${pctPago}%</div><div class="kpi-card-l">Pago</div></div>
    </div>
    ${narrativa?'<div class="sec-title">Registro da Semana</div><div class="narr">'+esc2(narrativa)+'</div>':''}
    ${srvs.filter(s=>(s.pct_atual||0)>=100).length?'<div class="sec-title" style="margin-top:24px">Serviços Concluídos</div>'+srvs.filter(s=>(s.pct_atual||0)>=100).map(s=>'<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #F0F0F0"><span style="color:'+p2+';font-weight:800;font-size:13px">✓</span><span style="font-size:12px;font-weight:600;color:#333">'+esc2(s.descricao)+'</span></div>').join(''):''}
  </div>

  <!-- 02 CRONOGRAMA -->
  <div class="panel" id="portal-panel-1">
    <div class="sec-title">Cronograma Visual — ${dias.length} dias</div>
    <div class="gantt-wrap">
      <table>
        <thead>
          <tr><th style="min-width:180px;background:#F5F5F5;border-bottom:1px solid #E0E0E0"></th><th style="min-width:65px;background:#F5F5F5;border-bottom:1px solid #E0E0E0"></th><th style="min-width:36px;background:#F5F5F5;border-bottom:1px solid #E0E0E0"></th>${monH}</tr>
          <tr><th style="padding:5px 8px;text-align:left;background:${p1};color:#fff;font-size:9px;font-weight:600;border-right:1px solid rgba(255,255,255,.15)">Serviço</th><th style="padding:5px 4px;text-align:center;background:${p1};color:#fff;font-size:9px;font-weight:600;border-right:1px solid rgba(255,255,255,.15)">Status</th><th style="padding:5px 4px;text-align:center;background:${p1};color:#fff;font-size:9px;font-weight:600;border-right:1px solid #CCC">%</th>${dayH}</tr>
        </thead>
        <tbody>${ganttRows}</tbody>
      </table>
    </div>
    <div class="gantt-legend">
      ${legenda}
      <span style="display:inline-flex;align-items:center;gap:3px;margin-left:8px"><span style="display:inline-block;width:10px;height:10px;background:#EF9A9A;border-radius:3px"></span><span style="font-size:9px;color:#888">Atrasado</span></span>
      <span style="display:inline-flex;align-items:center;gap:3px"><span style="display:inline-block;width:10px;height:10px;background:${p1};border-radius:3px"></span><span style="font-size:9px;color:#888">Hoje</span></span>
    </div>
  </div>

  <!-- 03 ORÇAMENTO -->
  <div class="panel" id="portal-panel-2">
    <div class="sec-title">Orçamento por Categoria</div>
    <div style="margin-bottom:16px;display:flex;gap:16px;flex-wrap:wrap">
      <div style="font-size:12px;color:var(--sub)">Total: <strong style="color:var(--ink);font-size:14px">R$ ${fmtNum(valContrato)}</strong></div>
      <div style="font-size:12px;color:var(--sub)">Serviços: <strong style="color:var(--ink)">${totalSrv}</strong></div>
      <div style="font-size:12px;color:var(--sub)">Avanço: <strong style="color:var(--ink)">${pctGeral}%</strong></div>
    </div>
    <table class="orc-table">
      <thead><tr><th>Categoria</th><th style="text-align:center">Serviços</th><th style="text-align:right">Valor</th><th style="text-align:right;padding-right:10px">Avanço</th></tr></thead>
      <tbody>${catRows}</tbody>
      <tfoot><tr style="border-top:2px solid var(--p1)"><td style="padding:10px;font-size:12px;font-weight:700">Total</td><td style="padding:10px;text-align:center;font-size:12px;font-weight:600">${totalSrv}</td><td style="padding:10px;text-align:right;font-size:13px;font-weight:700;font-family:monospace">R$ ${fmtNum(valContrato)}</td><td style="padding:10px;text-align:right;font-size:13px;font-weight:700;font-family:monospace;color:${p2}">${pctGeral}%</td></tr></tfoot>
    </table>
  </div>

  <!-- 04 FOTOS -->
  ${fotosOk.length?`<div class="panel" id="portal-panel-3">
    <div class="sec-title">Registro Fotográfico — ${fotos.length} fotos</div>
    <div class="foto-grid">
      ${fotosOk.map(f=>'<div class="foto-card"><img src="'+(f.url||f.src)+'" alt="'+esc2(f.titulo_rel||f.legenda||'')+'" loading="lazy"><div class="foto-card-info">'+(f.titulo_rel||f.legenda||'Sem legenda')+(f.data?' · '+esc2(f.data):'')+'</div></div>').join('')}
    </div>
  </div>`:''}

  <!-- 05 DOCUMENTOS -->
  ${links.length?`<div class="panel" id="portal-panel-${fotosOk.length?4:3}">
    <div class="sec-title">Documentos da Obra</div>
    <div class="link-grid">
      ${links.map(l=>'<a href="'+l.u+'" target="_blank" class="link-card"><span style="font-size:16px">'+l.i+'</span><span>'+esc2(l.k)+'</span></a>').join('')}
    </div>
  </div>`:''}

  <!-- FOOTER -->
  <div class="ftr">
    <div class="ftr-brand">${esc2(c.empresa||'BERTI CONSTRUTORA')}</div>
    <div class="ftr-name">${esc2(c.obra||'')}</div>
    <div class="ftr-meta">${c.email_empresa?esc2(c.email_empresa):''}${c.tel_empresa?' · '+esc2(c.tel_empresa):''}<br>Semana ${semana}/${totalMed} · Atualizado em ${geradoEm}</div>
    ${waTel?'<a href="https://wa.me/'+waTel+'" target="_blank" class="wa-btn">💬 Falar com o gestor</a>':''}
  </div>
</div>
<script>
function portalTab(n){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  var panel=document.getElementById('portal-panel-'+n);
  if(panel) panel.classList.add('active');
  document.querySelectorAll('.tab')[n].classList.add('active');
}
<\/script>
</body></html>`;
}


function gerarDashboardInterativo() {
  const c = state.config;
  const cor1 = c.cor1 || '#0D2016';
  const cor2 = c.cor2 || '#2E6645';
  const srvs = state.servicos || [];
  const pags = state.pagamentos || [];

  const totalSrv = srvs.length;
  const concluidos = srvs.filter(s => s.status_atual === 'CONCLUÍDO').length;
  const emAnd = srvs.filter(s => s.status_atual === 'EM ANDAMENTO').length;
  const aExec = srvs.filter(s => s.status_atual === 'A EXECUTAR').length;
  const totalVal = srvs.reduce((a, s) => a + (s.valor || 0), 0);
  const pctGeral = calcPctGeral();

  const taxaAdmin = c.taxa_admin || 15;
  const valorContrato = c.valor_contrato || totalVal || 0;
  const entradas = pags.filter(p => p.tipo === 'ENTRADA').reduce((a, p) => a + (parseFloat(p.valor) || 0), 0);
  const saidas = pags.filter(p => p.tipo === 'SAÍDA').reduce((a, p) => a + (parseFloat(p.valor) || 0), 0);
  const saldo = entradas - saidas;
  const pctPago = valorContrato > 0 ? Math.min(100, Math.round(entradas / valorContrato * 100)) : 0;

  // Categorias para barras
  const cats = {};
  srvs.forEach(s => {
    const k = s.categoria || 'Outros';
    if (!cats[k]) cats[k] = { total: 0, valor: 0, pctSum: 0, n: 0 };
    cats[k].total++;
    cats[k].valor += s.valor || 0;
    cats[k].pctSum += s.pct_atual || 0;
    cats[k].n++;
  });
  const catList = Object.entries(cats).sort((a, b) => b[1].valor - a[1].valor).slice(0, 8);
  const maxValCat = Math.max(...catList.map(([, v]) => v.valor), 1);

  // Equipes
  const eqMap = {};
  srvs.forEach(s => {
    const k = s.equipe_nome || s.equipe || '—';
    if (!eqMap[k]) eqMap[k] = { srvsAtivos: 0, valor: 0 };
    if (s.status_atual === 'EM ANDAMENTO') eqMap[k].srvsAtivos++;
    eqMap[k].valor += s.valor || 0;
  });
  const eqList = Object.entries(eqMap).filter(([k]) => k !== '—').sort((a, b) => b[1].valor - a[1].valor).slice(0, 6);

  // Donut SVG para progresso
  const r = 44, cx = 52, cy = 52, circ = 2 * Math.PI * r;
  const dash = circ * pctGeral / 100;
  const donut = `<svg width="104" height="104" viewBox="0 0 104 104">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${cor1}18" stroke-width="10"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${cor2}" stroke-width="10"
      stroke-dasharray="${dash} ${circ - dash}" stroke-dashoffset="${circ * 0.25}" stroke-linecap="butt"
      style="transition:stroke-dasharray .6s ease"/>
    <text x="${cx}" y="${cy - 4}" text-anchor="middle" fill="${cor1}" font-family="'Syne',sans-serif" font-size="18" font-weight="800">${pctGeral}%</text>
    <text x="${cx}" y="${cy + 12}" text-anchor="middle" fill="#9CA3AF" font-family="'Jost',sans-serif" font-size="9">concluído</text>
  </svg>`;

  const html = `<!DOCTYPE html><html lang="pt-BR"><head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard — ${esc2(c.obra || 'Obra')}</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Jost:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--c1:${cor1};--c2:${cor2};--bg:#F7F5F1;--surface:#fff;--border:#E5E0D8;--muted:#6B7280;--ink:#111}
    body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;line-height:1.5}
    .content{max-width:1000px;margin:0 auto;padding:20px 16px 60px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--c1);margin-bottom:12px}
    .card{background:var(--surface);border:1px solid var(--border);padding:20px}
    .card-full{background:var(--surface);border:1px solid var(--border);padding:20px;margin-bottom:12px}
    .kpi{background:var(--surface);padding:16px 20px;text-align:center}
    .kpi-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;line-height:1.1;margin-bottom:4px}
    .kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
    .card-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;color:var(--c1);text-transform:uppercase;letter-spacing:.7px;border-bottom:1.5px solid var(--c1);padding-bottom:8px;margin-bottom:14px}
    .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:11px}
    .bar-label{width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#374151}
    .bar-track{flex:1;height:8px;background:#F3F4F6;overflow:hidden}
    .bar-fill{height:100%;background:var(--c2);transition:width .5s ease}
    .bar-val{width:70px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
    .pct-arc{display:flex;align-items:center;justify-content:center}
    .stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F3F4F6;font-size:12px}
    .stat-row:last-child{border-bottom:none}
    .stat-val{font-family:'JetBrains Mono',monospace;font-weight:600}
    .badge{display:inline-flex;align-items:center;padding:3px 8px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.3px}
    .footer{text-align:center;padding:20px;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;border-top:1px solid var(--border);margin-top:12px}
    @media print{body{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}.content{padding:0}.grid-2,.grid-3,.grid-4{break-inside:avoid}}
    @media(max-width:600px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
  </style></head><body>
  ${buildDocHeader('Dashboard Interativo', `Semana ${c.semana || 1} · ${totalSrv} serviços`)}
  <div class="content">

    <!-- ROW 1: KPIs -->
    <div class="grid-4">
      <div class="kpi"><div class="kpi-val" style="color:var(--c2)">${pctGeral}%</div><div class="kpi-label">Avanço Geral</div></div>
      <div class="kpi"><div class="kpi-val" style="color:#065F46">${concluidos}</div><div class="kpi-label">Concluídos</div></div>
      <div class="kpi"><div class="kpi-val" style="color:#1D4E89">${emAnd}</div><div class="kpi-label">Em Andamento</div></div>
      <div class="kpi"><div class="kpi-val" style="color:var(--c1)">R$ ${fmtNum(saidas)}</div><div class="kpi-label">Saídas Semana</div></div>
    </div>

    <!-- ROW 2: Progresso + Financeiro -->
    <div class="grid-2">
      <!-- PROGRESSO GERAL -->
      <div class="card">
        <div class="card-title">Progresso Geral da Obra</div>
        <div style="display:flex;align-items:center;gap:20px">
          <div class="pct-arc">${donut}</div>
          <div style="flex:1">
            <div class="stat-row">

// v49 — HELPERS DE RELATÓRIO: Seletor + Delta + Fotos
// ═══════════════════════════════════════════════════════

function _selecionarSemanaRel(titulo, callback){
  // No relatorios.html, usa o seletor da toolbar
  var semSel = parseInt(document.getElementById('sel-semana').value) || (state.config.semana||1);
  callback(semSel);
}

function _getRelDelta(semNum){
  var snaps = state.snapshots || {};
  var semAtual = _calcSemanaReal();
  var isAtual = (semNum === semAtual);
  var snapAnterior = semNum > 1 ? snaps['S'+(semNum-1)] : null;

  // Range de datas desta semana (para filtrar pelo cronograma)
  var _range = _calcSemanaRange(semNum);
  var rangeIni = _range.iniISO;
  var rangeFim = _range.fimISO;

  // === MODO 1: Com snapshot anterior → delta real ===
  if(snapAnterior && Array.isArray(snapAnterior.servicos)){
    var mapAnterior = {};
    snapAnterior.servicos.forEach(function(s){ mapAnterior[s.cod] = s; });
    var srvsAlvo;
    if(isAtual){
      srvsAlvo = (state.servicos||[]).map(function(s){
        return { cod:s.cod, descricao:s.descricao, pct:s.pct_atual||0, status:s.status_atual||'', valor:s.valor||0,
                 categoria:s.categoria, equipe:s.equipe, equipe_nome:s.equipe_nome, local:s.local, ambiente:s.ambiente,
                 data_inicio:s.data_inicio, data_fim:s.data_fim, dias_marcados:s.dias_marcados, _original:s };
      });
    } else {
      var snapAlvo = snaps['S'+semNum];
      if(!snapAlvo || !Array.isArray(snapAlvo.servicos)){
        return { servicos:[], pctGeral:0, pctAnterior:0, isAtual:false, noSnapshot:true };
      }
      srvsAlvo = snapAlvo.servicos.map(function(s){
        var atual = (state.servicos||[]).find(function(x){ return x.cod === s.cod; });
        return { cod:s.cod, descricao:s.descricao||(atual?atual.descricao:''), pct:s.pct||0, status:s.status||'', valor:s.valor||0,
                 categoria:atual?atual.categoria:'', equipe:atual?atual.equipe:'', equipe_nome:atual?atual.equipe_nome:'',
                 local:atual?atual.local:'', ambiente:atual?atual.ambiente:'',
                 data_inicio:atual?atual.data_inicio:'', data_fim:atual?atual.data_fim:'', dias_marcados:atual?atual.dias_marcados:[],
                 _original:atual||null };
      });
    }
    var pctGeralAlvo = isAtual ? calcPctGeral() : (snaps['S'+semNum]?snaps['S'+semNum].pctGeral:0)||0;
    var pctAnterior = snapAnterior.pctGeral||0;
    var servicos = srvsAlvo.map(function(s){
      var ant = mapAnterior[s.cod];
      var pctAnt = ant ? (ant.pct||0) : 0;
      return Object.assign({}, s, { pct_anterior_snap:pctAnt, delta:s.pct-pctAnt });
    });
    return { servicos:servicos, pctGeral:pctGeralAlvo, pctAnterior:pctAnterior,
             deltaGeral:pctGeralAlvo-pctAnterior, periodoIni:rangeIni, periodoFim:rangeFim,
             isAtual:isAtual, noSnapshot:false };
  }

  // === MODO 2: Sem snapshot → filtrar pelo CRONOGRAMA (dias_marcados / datas) ===
  // Um serviço pertence à semana se seus dias_marcados ou data_inicio/data_fim
  // se sobrepõem ao range da semana
  var allSrvs = (state.servicos||[]).map(function(s){
    return { cod:s.cod, descricao:s.descricao, pct:s.pct_atual||0, status:s.status_atual||'', valor:s.valor||0,
             categoria:s.categoria, equipe:s.equipe, equipe_nome:s.equipe_nome, local:s.local, ambiente:s.ambiente,
             data_inicio:s.data_inicio, data_fim:s.data_fim, dias_marcados:s.dias_marcados, _original:s };
  });

  function _srvNaSemana(s){
    if(!rangeIni || !rangeFim) return s.pct > 0; // sem datas, mostra tudo com progresso
    // 1. dias_marcados (mais preciso)
    if(s.dias_marcados && s.dias_marcados.length){
      return s.dias_marcados.some(function(d){ return d >= rangeIni && d <= rangeFim; });
    }
    // 2. data_inicio/data_fim overlap
    var ini = s.data_inicio||'';
    var fim = s.data_fim||ini;
    if(!ini) return false;
    var iniISO = ini.includes('/') ? ini.split('/').reverse().join('-') : ini;
    var fimISO = fim.includes('/') ? fim.split('/').reverse().join('-') : fim;
    return iniISO <= rangeFim && fimISO >= rangeIni;
  }

  var servicos = allSrvs.filter(_srvNaSemana).map(function(s){
    // Sem snapshot, delta = pct_atual - pct_anterior (do cockpit)
    var pctAnt = s._original ? (s._original.pct_anterior||0) : 0;
    return Object.assign({}, s, { pct_anterior_snap:pctAnt, delta:s.pct-pctAnt });
  });

  return { servicos:servicos, pctGeral:calcPctGeral(), pctAnterior:0,
           deltaGeral:calcPctGeral(), periodoIni:rangeIni, periodoFim:rangeFim,
           isAtual:isAtual, noSnapshot:false };
}

function _filtrarFotosSemana(semNum){
  var semAtual = _calcSemanaReal();
  if(semNum === semAtual) return state.fotos || [];
  return [];
}

function _pctS(s){ return s.pct_atual !== undefined ? (s.pct_atual||0) : (s.pct||0); }

function _gerarMedicaoSemana(semNumSel){

    return;

    return a + Math.round((s.valor||0)*s.delta/100);

  <meta name="viewport" content="width=device-width,initial-scale=1">

  @media print{body{padding:0}.page{box-shadow:none;border-radius:0}.aceite-box,.aceite-confirmado{display:none!important}}</style></head><body>
  <div class="page">
    ${buildDocHeader(`Medição — Semana ${semNum}`, `${esc2(c.obra||'')} · ${esc2(c.razao_cliente||c.cliente||'')} · Ref: ${aceiteId}`)}
    <div style="padding:24px 32px">
      <table>
        <thead><tr><th>Serviço</th><th>Avanço</th><th style="text-align:right">Valor</th></tr></thead>

          <tr><td colspan="3" style="padding:12px;font-weight:700;font-size:13px;text-align:right">Total desta medição:</td>
          <td style="padding:12px;font-weight:800;font-size:15px;color:#059669;text-align:right">R$ ${fmtNum(totalMed)}</td></tr>

// TAREFA 1 — EXPORTAR TUDO ZIP
// ═══════════════════════════════════════════════════════════════════════
function exportarTudoZip(){
  const c = state.config;
  if(!c.obra){ toast('Configure a obra primeiro','error'); return; }
  const semana = c.semana || 1;
  const prefix = (c.obra||'obra').replace(/[^a-z0-9]/gi,'_').toLowerCase() + '_sem' + String(semana).padStart(2,'0');

  toast('Gerando ZIP com todos os relatórios em PDF... aguarde','info');

  // Salvar estado atual do modal
  var prevHtml = _relCurrentHtml;
  var prevTitle = _relCurrentTitle;

  // Coletar HTMLs de todos os relatórios
  var htmls = [];

  // 1. Relatório Semanal Interno
  try {
    _relCurrentHtml = ''; _relCurrentTitle = '';
    // Simula geração sem modal
    _gerarRelSemanalDireto(semana);
    if(_relCurrentHtml) htmls.push({ name: prefix+'_relatorio_semanal', html: _relCurrentHtml });
  } catch(e){ console.warn('ZIP: semanal falhou', e); }

  // 2. Relatório Semanal Cliente (Portal)
  try { var h = _buildPortalCliente(); if(h) htmls.push({ name: prefix+'_portal_cliente', html: h }); } catch(e){}

  // 3. Orçamento
  try {
    _relCurrentHtml = ''; _relCurrentTitle = '';
    abrirRelatorioOrcamento();
    if(_relCurrentHtml) htmls.push({ name: prefix+'_orcamento', html: _relCurrentHtml });
    fecharRelatorio();
  } catch(e){ console.warn('ZIP: orcamento falhou', e); }

  // 4. Financeiro
  try {
    _relCurrentHtml = ''; _relCurrentTitle = '';
    abrirRelatorioFinanceiro();
    if(_relCurrentHtml) htmls.push({ name: prefix+'_financeiro', html: _relCurrentHtml });
    fecharRelatorio();
  } catch(e){ console.warn('ZIP: financeiro falhou', e); }

  // 5. Gantt (período completo)
  try {
    _relCurrentHtml = ''; _relCurrentTitle = '';
    _gerarGanttPDF('completo');
    if(_relCurrentHtml) htmls.push({ name: prefix+'_gantt', html: _relCurrentHtml });
    fecharRelatorio();
  } catch(e){ console.warn('ZIP: gantt falhou', e); }

  // 6. Fotográfico
  try { var h2 = _gerarRelFotograficoHTML(); if(h2) htmls.push({ name: prefix+'_fotografico', html: h2 }); } catch(e){}

  // Restaurar estado do modal
  _relCurrentHtml = prevHtml;
  _relCurrentTitle = prevTitle;
  fecharRelatorio();

  // JSON de dados
  var textFiles = [];
  try {
    var json = JSON.stringify(_buildExportJSON(), null, 2);
    textFiles.push({ name: prefix+'_dados.json', content: json });
  } catch(e){}
  var blocoEl = document.getElementById('export-atualizacao');
  if(blocoEl && blocoEl.value.trim()){
    textFiles.push({ name: prefix+'_bloco_atualizacao.txt', content: blocoEl.value });
  }

  if(!htmls.length && !textFiles.length){ toast('Nenhum arquivo para exportar','info'); return; }

  toast('Convertendo '+htmls.length+' relatórios para PDF...','info');

  // Gerar PDFs sequencialmente (evita sobrecarga de memória)
  var pdfFiles = [];
  var chain = Promise.resolve();
  htmls.forEach(function(item){
    chain = chain.then(function(){
      return gerarPDFdoHTML(item.html, item.name+'.pdf').then(function(blob){
        return blob.arrayBuffer().then(function(buf){
          pdfFiles.push({ name: item.name+'.pdf', data: new Uint8Array(buf) });
        });
      }).catch(function(e){
        console.warn('ZIP PDF falhou para '+item.name, e);
        pdfFiles.push({ name: item.name+'.html', data: new TextEncoder().encode(item.html) });
      });
    });
  });

  chain.then(function(){
    var allFiles = pdfFiles.slice();
    textFiles.forEach(function(f){ allFiles.push({ name: f.name, data: new TextEncoder().encode(f.content) }); });
    if(!allFiles.length){ toast('Nenhum arquivo gerado','info'); return; }
    _criarZipEBaixarBin(allFiles, prefix+'.zip');
    toast('ZIP gerado com '+allFiles.length+' arquivo(s): '+allFiles.map(function(f){return f.name;}).join(', '),'success');
  }).catch(function(e){
    console.error('ZIP error:', e);
    toast('Erro ao gerar ZIP','error');
  });
}

// ZIP builder que aceita Uint8Array data diretamente (para PDFs binários)
function _criarZipEBaixarBin(arquivos, nomeZip){
  const enc = new TextEncoder();
  const files = arquivos.map(f => ({ name: enc.encode(f.name), data: f.data instanceof Uint8Array ? f.data : enc.encode(f.data) }));
  let offset = 0;
  const localHeaders = [];
  const centralEntries = [];

  files.forEach(f => {
    const localHeader = new Uint8Array(30 + f.name.length);
    const dv = new DataView(localHeader.buffer);
    dv.setUint32(0, 0x04034b50, true);
    dv.setUint16(4, 20, true);
    dv.setUint16(6, 0, true);
    dv.setUint16(8, 0, true);
    dv.setUint16(10, 0, true);
    dv.setUint16(12, 0, true);
    dv.setUint32(14, _crc32(f.data), true);
    dv.setUint32(18, f.data.length, true);
    dv.setUint32(22, f.data.length, true);
    dv.setUint16(26, f.name.length, true);
    dv.setUint16(28, 0, true);
    localHeader.set(f.name, 30);
    localHeaders.push(localHeader);

    const central = new Uint8Array(46 + f.name.length);
    const cv = new DataView(central.buffer);
    cv.setUint32(0, 0x02014b50, true);
    cv.setUint16(4, 20, true);
    cv.setUint16(6, 20, true);
    cv.setUint16(8, 0, true);
    cv.setUint16(10, 0, true);
    cv.setUint16(12, 0, true);
    cv.setUint16(14, 0, true);
    cv.setUint32(16, _crc32(f.data), true);
    cv.setUint32(20, f.data.length, true);
    cv.setUint32(24, f.data.length, true);
    cv.setUint16(28, f.name.length, true);
    cv.setUint16(30, 0, true);
    cv.setUint16(32, 0, true);
    cv.setUint16(34, 0, true);
    cv.setUint16(36, 0, true);
    cv.setUint32(38, 0, true);
    cv.setUint32(42, offset, true);
    central.set(f.name, 46);
    centralEntries.push(central);
    offset += localHeader.length + f.data.length;
  });

  const centralOffset = offset;
  let centralSize = 0;
  centralEntries.forEach(c => centralSize += c.length);
  const eocd = new Uint8Array(22);
  const ev = new DataView(eocd.buffer);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(4, 0, true);
  ev.setUint16(6, 0, true);
  ev.setUint16(8, files.length, true);
  ev.setUint16(10, files.length, true);
  ev.setUint32(12, centralSize, true);
  ev.setUint32(16, centralOffset, true);
  ev.setUint16(20, 0, true);

  const parts = [];
  files.forEach((f, i) => { parts.push(localHeaders[i]); parts.push(f.data); });
  centralEntries.forEach(c => parts.push(c));
  parts.push(eocd);

  const blob = new Blob(parts, { type: 'application/zip' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = nomeZip;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

function _crc32(data){
  let crc = 0xFFFFFFFF;
  if(!window._crc32Table){
    window._crc32Table = new Uint32Array(256);
    for(let n=0;n<256;n++){
      let c=n;
      for(let k=0;k<8;k++) c = c&1 ? 0xEDB88320^(c>>>1) : c>>>1;
      window._crc32Table[n] = c;
    }
  }
  const t = window._crc32Table;
  for(let i=0;i<data.length;i++) crc = t[(crc^data[i])&0xFF]^(crc>>>8);
  return (crc^0xFFFFFFFF) >>> 0;
}

function _gerarTituloPadrao(foto){
  // v48 — Prioridade: serviço vinculado > ambiente > data
  if(foto.servico_ref){
    const srv = (state.servicos||[]).find(s=>s.cod===foto.servico_ref);
    if(srv){
      const desc = (srv.descricao||'').replace(/\s*[-—]\s*(Salão|Sala|Cozinha|Banheiro)\s*\d*/i,'');
      const amb = foto.ambiente || srv.ambiente || srv.local || '';
      return amb ? desc + ' — ' + amb : desc;
    }
  }
  const amb = foto.ambiente || foto.grupo || 'Geral';
  const data = foto.data || today();
  return amb + ' — ' + data;
}

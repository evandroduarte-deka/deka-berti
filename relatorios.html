async function _gerarRelClienteSemana(semNumSel){
  const c = state.config;
  const semAtual = _calcSemanaReal();
  const semNum = semNumSel || semAtual;
  const isAtual = (semNum === semAtual);

  // v49 — Delta por snapshot
  const relDelta = _getRelDelta(semNum);
  if(relDelta.noSnapshot && !isAtual){
    toast('Semana '+semNum+' não tem snapshot. Avance a semana no cockpit para gravar.','error');
    return;
  }

  const t = getRelTema();
  const p1 = t.p1, p2 = t.p2;

  // v49 — Período da SEMANA selecionada (não da obra inteira)
  const _semRange = _calcSemanaRange(semNum);
  const periodo = _semRange.iniLabel && _semRange.fimLabel
    ? fmtDate(_semRange.iniISO) + ' a ' + fmtDate(_semRange.fimISO)
    : (c.periodo_ini ? fmtDate(c.periodo_ini) + ' a ' + fmtDate(c.periodo_fim||'') : '—');

  // v49 — Serviços: usar delta real da semana (snapshot-based)
  const srvsDelta = relDelta.servicos;
  const srvs = isAtual ? (state.servicos || []) : srvsDelta;
  const pags = state.pagamentos || [];

  // v49 — Fotos filtradas por semana
  const fotos = _filtrarFotosSemana(semNum);
  const narrativaOriginal = isAtual
    ? ((document.getElementById('narrativa-visita')||{}).value || state.narrativa || '')
    : _getNarrativaSemana(semNum);

  // v49 — pctGeral: tempo real ou do snapshot
  const pctGeral = isAtual ? calcPctGeral() : relDelta.pctGeral;

  // v49 — Narrativa para o relatório do cliente — REGISTRO TÉCNICO COM CONTEXTO ESTRATÉGICO
  let narrativa = '';
  // Helper: pct de um serviço (compatível com state.servicos e delta objects)
  function _pctS(s){ return s.pct_atual !== undefined ? (s.pct_atual||0) : (s.pct||0); }
  const concluidos_lst = srvs.filter(s=>_pctS(s)>=100).map(s=>s.descricao||'').filter(Boolean);
  const emAnd_lst = srvs.filter(s=>_pctS(s)>0&&_pctS(s)<100).map(s=>(s.descricao||'')+' ('+_pctS(s)+'%)').filter(Boolean);
  const prox_lst = srvs.filter(s=>_pctS(s)===0).slice(0,5).map(s=>s.descricao||'').filter(Boolean);

  // Calcular contexto de prazo para a narrativa
  let _narrPrazoCtx = '';
  if(c.periodo_ini && (c.periodo_fim||c.data_fim)){
    const _ni = new Date((c.periodo_ini.includes('/')?c.periodo_ini.split('/').reverse().join('-'):c.periodo_ini)+'T00:00:00');
    const _nf = new Date(((c.periodo_fim||c.data_fim).includes('/')?(c.periodo_fim||c.data_fim).split('/').reverse().join('-'):(c.periodo_fim||c.data_fim))+'T00:00:00');
    if(!isNaN(_ni) && !isNaN(_nf)){
      const _na = new Date(); _na.setHours(0,0,0,0);
      const _dt = Math.max(1, Math.round((_nf-_ni)/86400000));
      const _dd = Math.max(0, Math.round((_na-_ni)/86400000));
      const _prev = Math.min(100, Math.round(_dd/_dt*100));
      const _dev = pctGeral - _prev;
      _narrPrazoCtx = `\nContexto de prazo: ${_dd} de ${_dt} dias corridos (${_prev}% do tempo). Executado: ${pctGeral}%. Desvio: ${_dev>=0?'+':''}${_dev}%. ${_dev>=0?'Obra adiantada.':'Obra abaixo do previsto.'}`;
    }
  }

  // Serviços atrasados para contexto
  const _narrAtrasados = srvs.filter(s=>{
    if(_pctS(s)>=100) return false;
    const f = s.data_fim||''; if(!f) return false;
    const fISO = f.includes('/')?f.split('/').reverse().join('-'):f;
    return fISO < new Date().toISOString().slice(0,10);
  }).map(s=>s.descricao||'').filter(Boolean);

  const apiKey = localStorage.getItem('mdo_api_key');
  if(narrativaOriginal && apiKey){
    toast('Gerando registro técnico...','info');
    try {
      const promptNarr = 'Gere o registro técnico da semana para relatório de acompanhamento de obra.\n\n'
        +'REGRAS ABSOLUTAS — quebre qualquer uma e o texto é descartado:\n'
        +'- Terceira pessoa SEMPRE. PROIBIDO: "nós", "nossa equipe", "nosso time", "estamos", "iniciamos".\n'
        +'- PROIBIDO enrolação: "caminhando conforme", "condições ideais", "manteremos o ritmo".\n'
        +'- PROIBIDO tom motivacional ou otimista genérico.\n'
        +'- NÃO use códigos internos (SRV-XXX, EQ-XXX).\n'
        +'- Formato: 4 linhas secas separadas por quebra de linha.\n'
        +'- Linha 1: "Semana XX — [nome obra] — Avanço de XX% do cronograma. [Status: Adiantado/No prazo/Atenção]."\n'
        +'- Linha 2: Serviços concluídos e em andamento com percentual. Só fatos.\n'
        +'- Linha 3: "Foco semana XX:" + lista concreta do que será executado.\n'
        +'- Linha 4 (SE houver atrasados ou pendências): "Atenção:" + pontos que requerem acompanhamento.\n'
        +'- Máximo 100 palavras TOTAL. Cada palavra precisa ter informação.\n\n'
        +'DADOS:\nObra: '+(c.obra||'—')+'\nSemana: '+(c.semana||1)+'\nAvanço geral: '+pctGeral+'%\n'
        +_narrPrazoCtx+'\n'
        +'Concluídos: '+(concluidos_lst.join(', ')||'nenhum')+'\n'
        +'Em andamento: '+(emAnd_lst.join(', ')||'nenhum')+'\n'
        +'Próximos: '+(prox_lst.join(', ')||'—')+'\n'
        +(_narrAtrasados.length ? 'Atrasados: '+_narrAtrasados.join(', ')+'\n' : '')
        +'\nNARRATIVA ORIGINAL:\n'+narrativaOriginal+'\n\nRegistro técnico:';
      narrativa = await callClaude({ messages:[{role:'user',content:promptNarr}], max_tokens:300 });
    } catch(e){
      console.warn('Fallback narrativa cliente:', e);
      narrativa = narrativaOriginal.replace(/\b(SRV|EQ|FOR)-[\w-]+/gi,'').replace(/\s{2,}/g,' ').trim();
    }
  } else if(narrativaOriginal){
    narrativa = narrativaOriginal.replace(/\b(SRV|EQ|FOR)-[\w-]+/gi,'').replace(/\s{2,}/g,' ').trim();
  }

  const emAnd = srvs.filter(s=>_pctS(s)>0&&_pctS(s)<100).length;
  const concluidos = srvs.filter(s=>_pctS(s)>=100).length;
  const totalVal = srvs.reduce((a,s)=>a+(s.valor||0),0);
  const valContrato = c.valor_contrato || totalVal || 0;
  const totalPago = pags.filter(p=>p.tipo==='ENTRADA').reduce((a,p)=>a+(parseFloat(p.valor)||0),0);
  const emAberto = valContrato - totalPago;
  const semana = semNum;
  const totalMed = c.medicoes||7;

  // v49 — Serviços executados NA SEMANA — delta real via snapshot
  // Para semana atual: compara com snapshot S(n-1)
  // Para semana passada: usa delta calculado por _getRelDelta
  // v49 — Serviços da semana: filtrados por cronograma ou por delta
  // Se tem snapshot: mostra serviços com delta > 0
  // Se sem snapshot: _getRelDelta já filtrou pelo cronograma, mostra todos com atividade
  const srvsem = srvsDelta.filter(s => s.delta > 0 || s.pct > 0);

  // v48 — Detectar se coluna Local tem algum valor preenchido
  const temLocal = srvsem.some(s=>(s.local||s.ambiente||'').trim() && (s.local||s.ambiente||'').trim()!=='—');

  // v48 — Helper: nome limpo da equipe para o cliente (sem código EQ-/FOR-)
  function _nomeEquipeCliente(s){
    const eq = (state.equipes||[]).find(e=>e.cod===s.equipe);
    if(eq) return esc2(eq.responsavel||eq.nome||eq.especialidade||'');
    // fallback: limpar código do nome
    return esc2((s.equipe_nome||s.equipe||'').replace(/^(EQ|FOR)-[\w]+-\d+\s*/i,'').trim()||'—');
  }

  // v49 — Ordenar: concluídos primeiro, depois em andamento por % desc, depois a executar
  const srvOrdenados = srvsem.slice().sort((a,b)=>{
    const pa = a.pct||0, pb = b.pct||0;
    if(pa>=100 && pb<100) return -1;
    if(pb>=100 && pa<100) return 1;
    if(pa>0 && pb===0) return -1;
    if(pb>0 && pa===0) return 1;
    return pb-pa;
  });

  const srvRows = srvOrdenados.length ? srvOrdenados.map(s=>{
    const pct = s.pct||0;
    // Status recalculado pelo % — não confiar no status_atual que pode estar desatualizado
    const stReal = pct >= 100 ? 'CONCLUÍDO' : pct > 0 ? 'EM ANDAMENTO' : 'A EXECUTAR';
    const st = stReal==='CONCLUÍDO'?'<span class="bdg bg">Concluído</span>':
               stReal==='EM ANDAMENTO'?'<span class="bdg bb">Em andamento</span>':
               '<span class="bdg bc">A executar</span>';
    // v48 — Descrição limpa (sem código SRV-)
    const descLimpa = esc2((s.descricao||'').replace(/^SRV-\d+\s*[-—]\s*/i,''));
    // v48 — Período em texto
    const _ini = s.data_inicio ? fmtDate(s.data_inicio) : '';
    const _fim = s.data_fim ? fmtDate(s.data_fim) : '';
    const periodoSrv = _ini ? (_ini + (_fim && _fim !== _ini ? ' a ' + _fim : '')) : '—';
    return `<tr>
      <td><div class="tnm">${descLimpa}</div></td>
      ${temLocal ? `<td><div class="tlc">${esc2(s.local||s.ambiente||'—')}</div></td>` : `<td><div class="tlc">${_nomeEquipeCliente(s)}</div></td>`}
      <td style="font-size:10px;color:var(--cinza);font-family:monospace;white-space:nowrap">${periodoSrv}</td>
      <td>${st}</td>
      <td><div class="prow"><div class="pbg"><div class="pfg${pct>=100?' done':''}" style="width:${pct}%"></div></div><span class="mono">${pct}%</span>${s.delta>0?'<span style="font-size:8px;color:#2E7D32;margin-left:4px;font-weight:700">+'+s.delta+'%</span>':''}</div></td>
    </tr>`;
  }).join('') : `<tr><td colspan="5" style="color:var(--cinza);text-align:center;padding:16px">Nenhum serviço com avanço nesta semana</td></tr>`;

  // Próxima semana — serviços programados com datas do cronograma
  // v48 — Fotos: resumo compacto com fotos-destaque (máx 4) em vez de galeria completa
  const totalFotos = fotos.length;
  const gruposFoto = {};
  fotos.forEach(f=>{const g=f.ambiente||f.grupo||'Geral';(gruposFoto[g]=gruposFoto[g]||[]).push(f);});
  const nAmbientes = Object.keys(gruposFoto).length;

  // Selecionar até 4 fotos-destaque: priorizar fotos com titulo_rel ou legenda, depois as mais recentes
  const fotosComTitulo = fotos.filter(f=>f.titulo_rel||(f.legenda&&f.legenda!=='Sem legenda'));
  const fotosDestaque = (fotosComTitulo.length >= 4 ? fotosComTitulo : fotos).slice(-4);

  const fotosHtml = totalFotos > 0 ? `
    <div style="font-size:11px;color:var(--cinza);margin-bottom:12px;padding:8px 12px;background:var(--fundo);border-radius:4px;border-left:3px solid ${p2}">
      <strong>${totalFotos} foto${totalFotos!==1?'s':''}</strong> registrada${totalFotos!==1?'s':''} nesta semana · ${nAmbientes} ambiente${nAmbientes!==1?'s':''}
      ${totalFotos > 4 ? ' — registro fotográfico completo disponível em anexo' : ''}
    </div>
    <div class="fgrid">${fotosDestaque.map(f=>{
      const titulo = f.titulo_rel || (f.legenda && f.legenda !== 'Sem legenda' ? f.legenda : '');
      return `
      <div class="fcard">
        ${f.url||f.src?`<img class="fph" src="${f.url||f.src}" alt="${esc2(titulo||'')}">` : `<div class="fph-ph">FOTO</div>`}
        <div class="finf">${titulo?`<div class="fleg">${esc2(titulo)}</div>`:''}
        <div class="fdt">${esc2(f.ambiente||'Geral')}${f.data?' · '+esc2(f.data):''}</div></div>
      </div>`;
    }).join('')}
    </div>` : '<div style="padding:20px;color:var(--cinza);text-align:center;font-size:12px">Nenhuma foto registrada nesta semana</div>';

  const pctPago = valContrato > 0 ? Math.round(totalPago/valContrato*100) : 0;

  const cabHeader = buildBertiHeader({
    tipo: 'Relatório de Acompanhamento de Obra',
    obra: c.obra || 'Obra',
    end: esc2(c.endereco_obra || ''),
    campos: [
      {l:'Contratante', v: esc2(c.razao_cliente||c.cliente||'—'), s: c.cnpj_cliente?`CNPJ ${esc2(c.cnpj_cliente)}`:''},
      {l:'Semana / Revisão', v: `Semana ${semana} — Rev. A`},
      {l:'Período', v: periodo},
      {l:'Contratada', v: esc2(c.empresa||'Berti Construtora LTDA'), s: c.email_empresa?esc2(c.email_empresa):''}
    ]
  });

  // v48 — Próxima medição: lógica corrigida (não somar 1 cegamente)
  const proxMedicao = semana < totalMed ? semana + 1 : totalMed;

  // ═══ FASE 2 — v48: SPI, Pontos de Atenção, Próxima Semana ═══

  // ── SPI simplificado ──
  let spiLabel = '', spiBadge = '', spiDesvio = 0, spiPrevisto = 0;
  let _obraIni = null, _obraFim = null;
  if(c.periodo_ini){
    _obraIni = new Date((c.periodo_ini.includes('/') ? c.periodo_ini.split('/').reverse().join('-') : c.periodo_ini)+'T00:00:00');
    if(isNaN(_obraIni)) _obraIni = null;
  }
  if(c.periodo_fim || c.data_fim){
    const ff = c.periodo_fim || c.data_fim;
    _obraFim = new Date((ff.includes('/') ? ff.split('/').reverse().join('-') : ff)+'T00:00:00');
    if(isNaN(_obraFim)) _obraFim = null;
  }
  if(_obraIni && _obraFim){
    const agora = new Date(); agora.setHours(0,0,0,0);
    const diasTotal = Math.max(1, Math.round((_obraFim - _obraIni) / 86400000));
    const diasDecorridos = Math.max(0, Math.round((agora - _obraIni) / 86400000));
    spiPrevisto = Math.min(100, Math.round(diasDecorridos / diasTotal * 100));
    spiDesvio = pctGeral - spiPrevisto;
    if(spiDesvio >= 5){
      spiLabel = 'Adiantado';
      spiBadge = `<div style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:#E8F5E9;border-radius:4px;margin-top:4px">
        <span style="font-size:11px;font-weight:700;color:#2E7D32">Adiantado</span>
        <span style="font-size:10px;color:#2E7D32;font-family:monospace">+${spiDesvio}%</span></div>`;
    } else if(spiDesvio >= -5){
      spiLabel = 'No prazo';
      spiBadge = `<div style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:#E3F2FD;border-radius:4px;margin-top:4px">
        <span style="font-size:11px;font-weight:700;color:#1565C0">No prazo</span></div>`;
    } else {
      spiLabel = 'Atenção';
      spiBadge = `<div style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:#FFF3E0;border-radius:4px;margin-top:4px">
        <span style="font-size:11px;font-weight:700;color:#E65100">Atenção</span>
        <span style="font-size:10px;color:#E65100;font-family:monospace">${spiDesvio}%</span></div>`;
    }
  }

  // ── Pontos de Atenção: serviços atrasados + pendências + pausados ──
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const hojeISO = hoje.toISOString().slice(0,10);

  const srvAtrasados = srvs.filter(s => {
    if(_pctS(s) >= 100) return false;
    const fim = s.data_fim || '';
    if(!fim) return false;
    const fimISO = fim.includes('/') ? fim.split('/').reverse().join('-') : fim;
    return fimISO < hojeISO && _pctS(s) < 100;
  });

  const srvPausados = srvs.filter(s => {
    const st = (s.status_atual||s.status||'').toUpperCase();
    return st === 'PAUSADO' || st === 'AGUARDANDO PROJETO' || st === 'AGUARDANDO';
  });

  const pendencias = state.pendencias || [];

  let pontosAtencaoRows = '';
  let pontosCount = 0;

  srvAtrasados.forEach(s => {
    const fimD = new Date((s.data_fim.includes('/') ? s.data_fim.split('/').reverse().join('-') : s.data_fim)+'T00:00:00');
    const diasAtraso = Math.max(1, Math.round((hoje - fimD) / 86400000));
    const descLimpa = esc2((s.descricao||'').replace(/^SRV-\d+\s*[-—]?\s*/i,''));
    pontosAtencaoRows += `<tr>
      <td style="padding:8px 10px;font-size:11px;font-weight:600">${descLimpa}</td>
      <td style="padding:8px 10px;text-align:center"><span style="display:inline-block;padding:2px 8px;font-size:9px;font-weight:600;background:#FFF3E0;color:#E65100;border-radius:3px">Atrasado</span></td>
      <td style="padding:8px 10px;font-size:11px;color:#C62828;font-weight:600">${diasAtraso} dia${diasAtraso>1?'s':''} de atraso</td>
    </tr>`;
    pontosCount++;
  });

  srvPausados.forEach(s => {
    const motivo = (s.status_atual||'').replace('AGUARDANDO','Aguardando');
    const descLimpa = esc2((s.descricao||'').replace(/^SRV-\d+\s*[-—]?\s*/i,''));
    pontosAtencaoRows += `<tr>
      <td style="padding:8px 10px;font-size:11px;font-weight:600">${descLimpa}</td>
      <td style="padding:8px 10px;text-align:center"><span style="display:inline-block;padding:2px 8px;font-size:9px;font-weight:600;background:#E3F2FD;color:#1565C0;border-radius:3px">${esc2(motivo)}</span></td>
      <td style="padding:8px 10px;font-size:11px;color:#666">Depende de liberação</td>
    </tr>`;
    pontosCount++;
  });

  pendencias.filter(p => p.status !== 'RESOLVIDO' && p.status !== 'CONCLUÍDO').forEach(p => {
    const tipo = (p.tipo||'Pendência').replace('DECISAO_CLIENTE','Decisão do cliente').replace('BLOQUEADOR','Bloqueador');
    const descPend = esc2((p.descricao||p.titulo||'').replace(/\b(SRV|EQ|FOR)-[\w-]+\s*/gi,'').trim());
    pontosAtencaoRows += `<tr>
      <td style="padding:8px 10px;font-size:11px;font-weight:600">${descPend}</td>
      <td style="padding:8px 10px;text-align:center"><span style="display:inline-block;padding:2px 8px;font-size:9px;font-weight:600;background:#FCE4EC;color:#C62828;border-radius:3px">${esc2(tipo)}</span></td>
      <td style="padding:8px 10px;font-size:11px;color:#666">${esc2(p.impacto||'Verificar urgência')}</td>
    </tr>`;
    pontosCount++;
  });

  const pontosHtml = pontosCount > 0 ? `
  <div class="sec"><span class="sec-n">03</span><span class="sec-t">Pontos de Atenção</span></div>
  <table class="tb">
    <thead><tr><th>Item</th><th>Tipo</th><th>Impacto</th></tr></thead>
    <tbody>${pontosAtencaoRows}</tbody>
  </table>` : '';

  // ── Próxima Semana: baseado no ciclo real da obra (periodo_ini + semana) ──
  const _proxRange = _calcSemanaRange(semana + 1);
  const proxSegISO = _proxRange.iniISO;
  const proxDomISO = _proxRange.fimISO;

  const srvProxSemana = srvs.filter(s => {
    if(_pctS(s) >= 100) return false;
    if(!proxSegISO || !proxDomISO) return false;
    // Serviço com dias_marcados no cronograma que caem na próxima semana
    if(s.dias_marcados && s.dias_marcados.length){
      return s.dias_marcados.some(d => d >= proxSegISO && d <= proxDomISO);
    }
    // Fallback: data_inicio/data_fim intersecta a próxima semana
    const ini = s.data_inicio || '';
    const fim = s.data_fim || ini;
    if(!ini) return false;
    const iniISO = ini.includes('/') ? ini.split('/').reverse().join('-') : ini;
    const fimISO = fim.includes('/') ? fim.split('/').reverse().join('-') : fim;
    return iniISO <= proxDomISO && fimISO >= proxSegISO;
  });

  function _eqNomeLimpo(s){
    const eq = (state.equipes||[]).find(e=>e.cod===s.equipe);
    return eq ? esc2(eq.responsavel||eq.nome||eq.especialidade||'') : '—';
  }

  const proxSemLabel = `S${semana+1} · ${_proxRange.iniLabel} a ${_proxRange.fimLabel}`;

  const proxSemRows = srvProxSemana.length ? srvProxSemana.map(s => {
    const _pIni = s.data_inicio ? fmtDate(s.data_inicio) : '';
    const _pFim = s.data_fim ? fmtDate(s.data_fim) : '';
    const _pPeriodo = _pIni ? (_pIni + (_pFim && _pFim !== _pIni ? ' a ' + _pFim : '')) : '—';
    return `<tr>
    <td style="padding:6px 10px;font-size:11px;font-weight:600">${esc2(s.descricao||'')}</td>
    <td style="padding:6px 10px;font-size:11px;color:var(--cinza)">${_eqNomeLimpo(s)}</td>
    <td style="padding:6px 10px;font-size:10px;color:var(--cinza);font-family:monospace;white-space:nowrap">${_pPeriodo}</td>
    <td style="padding:6px 10px;font-size:11px;color:var(--cinza)">${_pctS(s)}%</td>
  </tr>`;
  }).join('') : `<tr><td colspan="4" style="padding:12px;color:var(--cinza);text-align:center;font-size:11px">Nenhum serviço programado para a próxima semana</td></tr>`;

  const proxSemHtml = `
  <div class="sec"><span class="sec-n">${pontosCount > 0 ? '04' : '03'}</span><span class="sec-t">Planejamento Próxima Semana</span><span style="font-size:10px;color:var(--cinza);margin-left:8px;font-weight:400">${proxSemLabel}</span></div>
  <table class="tb">
    <thead><tr><th>Serviço</th><th>Equipe</th><th>Período</th><th>Atual</th></tr></thead>
    <tbody>${proxSemRows}</tbody>
  </table>`;

  // ── Numeração dinâmica para fotos ──
  const secFotos = pontosCount > 0 ? '05' : '04';

  // v48 — Barra financeira: ocultar quando valor_contrato == 0
  const temFinanceiro = valContrato > 0;
  const finBandHtml = temFinanceiro ? `
<div class="fin-band">
  <div class="fb">
    <div class="fb-l">Valor do Contrato</div>
    <div class="fb-v">R$ ${fmtNum(valContrato)}</div>
    <div class="fb-s">Total contratado · ${totalMed} medições previstas</div>
    <div class="fb-bar"><div class="fb-fill" style="width:${pctPago}%"></div></div>
  </div>
  <div class="fb-div"></div>
  <div class="fb">
    <div class="fb-l">Valor Pago</div>
    <div class="fb-v pago">R$ ${fmtNum(totalPago)}</div>
    <div class="fb-s">${pctPago}% do contrato</div>
  </div>
  <div class="fb-div"></div>
  <div class="fb">
    <div class="fb-l">Saldo em Aberto</div>
    <div class="fb-v aberto">R$ ${fmtNum(Math.max(0,emAberto))}</div>
    <div class="fb-s">${100-pctPago}% restante</div>
  </div>
  <div class="fb-div"></div>
  <div class="fb">
    <div class="fb-l">Próx. Medição</div>
    <div class="fb-v sm">${esc2(fmtDate(c.periodo_fim)||'—')}</div>
    <div class="fb-s">Medição ${proxMedicao} de ${totalMed}</div>
  </div>
</div>` : '';

  // ═══ MACRO-CRONOGRAMA — Visão por fases para o cliente ═══
  const MACRO_FASES = [
    { nome:'Preparo', cats:['Preliminares','Demolições'], cor:'#4A5568' },
    { nome:'Infraestrutura', cats:['Infraestrutura','Hidráulica','Elétrica','Ar-condicionado'], cor:'#2B6CB0' },
    { nome:'Estrutura', cats:['Alvenaria','Drywall / Forro','PPCI / Incêndio','Construções e Regularizações','Cobertura','Estruturas Especiais','Impermeabilização'], cor:'#6B46C1' },
    { nome:'Acabamento', cats:['Pintura','Revestimento'], cor:'#B7791F' },
    { nome:'Instalações', cats:['Marcenaria','Serralheria','Vidraçaria','Projetos'], cor:'#2F855A' },
    { nome:'Entrega', cats:['Limpeza','Administração'], cor:'#C53030' }
  ];

  const macroFases = MACRO_FASES.map(fase => {
    const srvsF = srvs.filter(s => fase.cats.includes(s.categoria));
    if(!srvsF.length) return null;
    const total = srvsF.length;
    const concl = srvsF.filter(s => _pctS(s) >= 100).length;
    const pctF = total > 0 ? Math.round(srvsF.reduce((a,s) => a + _pctS(s), 0) / total) : 0;
    // Datas
    const datas = srvsF.filter(s => s.data_inicio).map(s => s.data_inicio.includes('/') ? s.data_inicio.split('/').reverse().join('-') : s.data_inicio).sort();
    const datasFim = srvsF.filter(s => s.data_fim).map(s => s.data_fim.includes('/') ? s.data_fim.split('/').reverse().join('-') : s.data_fim).sort();
    const primeiraData = datas.length ? datas[0] : '';
    const ultimaData = datasFim.length ? datasFim[datasFim.length-1] : '';
    const iniLabel = primeiraData ? primeiraData.split('-').reverse().slice(0,2).join('/') : '';
    const fimLabel = ultimaData ? ultimaData.split('-').reverse().slice(0,2).join('/') : '';
    const status = pctF >= 100 ? 'done' : pctF > 0 ? 'progress' : 'pending';
    return { nome:fase.nome, cor:fase.cor, total, concl, pct:pctF, iniLabel, fimLabel, status };
  }).filter(Boolean);

  // v49 — Macro-cronograma RESPONSIVO: vertical em mobile (<600px), horizontal em desktop
  const macroHtml = macroFases.length >= 2 ? `
  <div style="margin:20px 0 24px;padding:20px 24px;background:var(--fundo,#FAFAF8);border:1px solid var(--linha,#E5E0D8);border-radius:8px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--cinza,#888)">Cronograma por Fase</div>
      <div style="font-size:10px;color:var(--cinza)">${macroFases.filter(f=>f.status==='done').length} de ${macroFases.length} fases concluídas</div>
    </div>
    <style>
      .macro-grid{display:flex;align-items:stretch;gap:0;position:relative;overflow-x:auto}
      .macro-card-wrap{flex:1;min-width:100px;display:flex;align-items:stretch}
      .macro-card{flex:1;padding:10px 12px;border-radius:6px;display:flex;flex-direction:column;justify-content:space-between}
      .macro-conn{flex-shrink:0;width:16px;display:flex;align-items:center;justify-content:center}
      .macro-conn-line{width:12px;height:1.5px}
      @media(max-width:600px){
        .macro-grid{flex-direction:column;gap:6px;overflow-x:visible}
        .macro-card-wrap{min-width:0;flex-direction:column}
        .macro-conn{width:auto;height:12px;justify-content:flex-start;padding-left:16px}
        .macro-conn-line{width:1.5px;height:8px}
      }
    </style>
    <div class="macro-grid">
      ${macroFases.map((f, fi) => {
        const bgCard = f.status==='done' ? f.cor+'18' : f.status==='progress' ? f.cor+'12' : '#F4F4F4';
        const borderCard = f.status==='done' ? f.cor+'40' : f.status==='progress' ? f.cor+'30' : '#E0E0E0';
        const textColor = f.status==='done' ? f.cor : f.status==='progress' ? f.cor : '#AAAAAA';
        const barBg = f.status==='done' ? f.cor : f.status==='progress' ? f.cor : '#D4D4D4';
        const statusIcon = f.status==='done' ? '<span style="font-size:11px;font-weight:800;color:'+f.cor+'">✓</span>' :
                           f.status==='progress' ? '<span style="font-size:9px;font-weight:700;color:'+f.cor+'">'+f.pct+'%</span>' :
                           '<span style="font-size:9px;color:#BBB">—</span>';
        const connector = fi < macroFases.length-1 ? '<div class="macro-conn"><div class="macro-conn-line" style="background:'+(f.status==='done'?f.cor+'60':'#D4D4D4')+'"></div></div>' : '';
        return `<div class="macro-card-wrap">
          <div class="macro-card" style="background:${bgCard};border:1px solid ${borderCard}">
            <div>
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
                <div style="font-size:10px;font-weight:700;color:${textColor};text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc2(f.nome)}</div>
                ${statusIcon}
              </div>
              <div style="height:3px;background:${f.status==='pending'?'#E8E8E8':barBg+'25'};border-radius:2px;overflow:hidden;margin-bottom:4px"><div style="height:100%;width:${f.pct}%;background:${barBg};border-radius:2px;transition:width .3s"></div></div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div style="font-family:monospace;font-size:8px;color:${f.status==='pending'?'#CCC':textColor+'BB'}">${f.iniLabel||''}${f.fimLabel&&f.fimLabel!==f.iniLabel?' — '+f.fimLabel:''}</div>
              <div style="font-size:8px;color:${f.status==='pending'?'#CCC':textColor+'99'}">${f.concl}/${f.total}</div>
            </div>
          </div>
          ${connector}
        </div>`;
      }).join('')}
    </div>
  </div>` : '';

  // Renumerar seções dinamicamente
  let secNum = 1;

  const body = `${getBertiCSS(p1,p2)}<body>
<div class="doc">
${cabHeader}
${finBandHtml}
<div class="kstrip">
  <div class="ks">
    <div class="ks-v">${pctGeral}%</div>
    <div class="ks-l">Avanço Geral da Obra</div>
    <div class="ks-bar"><div class="ks-prog" style="width:${pctGeral}%"></div></div>
    ${spiBadge}
  </div>
  <div class="ks">
    <div class="ks-v" style="color:#065F46">${concluidos}</div>
    <div class="ks-l">Serviços Concluídos</div>
  </div>
  <div class="ks">
    <div class="ks-v" style="color:#1E3A8A">${emAnd}</div>
    <div class="ks-l">Em Andamento</div>
  </div>
  <div class="ks">
    <div class="ks-v" style="font-size:26px;line-height:1.15">${esc2(fmtDate(c.data_fim||c.periodo_fim)||'—')}</div>
    <div class="ks-l">Entrega Prevista</div>
  </div>
</div>
<div class="corpo">
  <div class="sec"><span class="sec-n">0${secNum}</span><span class="sec-t">Resumo da Semana</span></div>
  <div class="narr">${narrativa ? esc2(narrativa) : 'Sem narrativa registrada para esta semana.'}</div>

  ${macroHtml}

  <div class="sec"><span class="sec-n">0${++secNum}</span><span class="sec-t">Serviços Executados</span></div>
  <table class="tb">
    <thead><tr><th>Serviço</th><th>${temLocal ? 'Local' : 'Equipe'}</th><th>Período</th><th>Status</th><th>Progresso</th></tr></thead>
    <tbody>${srvRows}</tbody>
  </table>

  ${proxSemHtml.replace(/sec-n">\d+/,'sec-n">0'+(++secNum))}

</div>
<div class="rdp">
  <div class="rdp-l">${esc2(c.empresa||'Berti Construtora LTDA')} · ${esc2(c.email_empresa||c.tel_empresa?((c.email_empresa||'')+(c.tel_empresa?' · '+c.tel_empresa:'')):'')}</div>
  <div class="rdp-c">${esc2(c.obra||'')} — Semana ${semana}</div>
  <div class="rdp-r">${today()} · Rev. A</div>
</div>
</div></body>`;

  abrirModalRel(`Relatório Semanal Cliente — Semana ${semana}`, body);
}

// ═══════════════════════════════════════════════════════════════
// ORÇAMENTO DETALHADO — padrão BERTI
// ═══════════════════════════════════════════════════════════════
function abrirRelatorioOrcamento(){
  const c = state.config;
  const t = getRelTema();
  const p1 = t.p1, p2 = t.p2;
  const pi = c.periodo_ini ? fmtDate(c.periodo_ini) : '';
  const pf = c.periodo_fim ? fmtDate(c.periodo_fim) : '';
  const srvs = state.servicos || [];
  const totalOrc = srvs.reduce((a,s)=>a+(s.valor||0),0);
  const valContrato = c.valor_contrato || totalOrc || 0;
  const executado = srvs.reduce((a,s)=>a+(s.valor||0)*(s.pct_atual||0)/100,0);
  const taxaAdm = c.taxa_admin||15;

  const pctGeral = calcPctGeral();

  // ── Agrupar serviços por categoria ──
  const catOrder = ['Preliminares','Demolições','Infraestrutura','Alvenaria','Construções e Regularizações','Impermeabilização','Pintura','Hidráulica','Elétrica','Ar-condicionado','Drywall / Forro','Revestimento','Cobertura','Serralheria','Estruturas Especiais','PPCI / Incêndio','Projetos','Marcenaria','Limpeza','Administração'];
  const catMap = {};
  // v48 — Filtrar: serviços com quantidade 0 não aparecem
  srvs.filter(s => (s.quantidade || s.qtde || 1) > 0).forEach(s => {
    const cat = s.categoria || 'Sem Categoria';
    if(!catMap[cat]) catMap[cat] = [];
    catMap[cat].push(s);
  });
  // Order: known categories first, then unknown
  const catKeys = [];
  catOrder.forEach(c => { if(catMap[c]) catKeys.push(c); });
  Object.keys(catMap).forEach(c => { if(!catKeys.includes(c)) catKeys.push(c); });

  let srvRows = '';
  if(!srvs.length){
    srvRows = `<tr><td colspan="8" style="color:var(--cinza);text-align:center;padding:20px">Nenhum serviço cadastrado</td></tr>`;
  } else {
    catKeys.forEach(cat => {
      const items = catMap[cat];
      const catTotal = items.reduce((a,s)=>a+(s.valor||0),0);
      const catPct = catTotal > 0 ? Math.round(items.reduce((a,s)=>a+(s.pct_atual||0)*(s.valor||0),0)/catTotal) : 0;
      const catConc = items.filter(s=>(s.pct_atual||0)>=100).length;
      const catAndamento = items.filter(s=>(s.pct_atual||0)>0&&(s.pct_atual||0)<100).length;

      // Category header row — inline bg on every TD to override nth-child(even)
      // v48 — Indicador de progresso comercial (sem 0/1)
      const catStatusLabel = catConc === items.length ? 'Concluída' :
                             catAndamento > 0 ? catAndamento + ' em andamento' :
                             'A executar';
      srvRows += `<tr style="background:var(--preto);page-break-inside:avoid">
        <td colspan="5" style="background:var(--preto)!important;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:8px 10px">${esc2(cat)}</td>
        <td style="background:var(--preto)!important;text-align:center;color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:9px;padding:8px 4px">${catStatusLabel}</td>
        <td style="background:var(--preto)!important;text-align:right;color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:9px;padding:8px 4px">${catPct}%</td>
        <td class="r mono" style="background:var(--preto)!important;color:#fff;font-size:11px;font-weight:700;padding:8px 10px">R$ ${fmtNum(catTotal)}</td>
      </tr>`;

      // Service rows
      items.forEach(s => {
        const pct = s.pct_atual||0;
        const st = _statusBadge(s);
        const stText = _statusText(s);
        const nm = stText==='A EXECUTAR'?'color:var(--cinza)':'font-weight:700;color:var(--texto)';
        const vl = stText==='A EXECUTAR'?'color:var(--cinza)':'font-weight:700;color:var(--texto)';
        // v48 — Valor "A definir" quando zerado mas com quantidade
        const valUnit = s.valor_unitario||s.valor||0;
        const valTotal = s.valor||0;
        const valUnitDisplay = valUnit > 0 ? 'R$ '+fmtNum(valUnit) : '<span style="font-style:italic;font-size:8px">A definir</span>';
        const valTotalDisplay = valTotal > 0 ? 'R$ '+fmtNum(valTotal) : '<span style="font-style:italic;font-size:8px">A definir</span>';
        srvRows += `<tr>
          <td class="mono" style="font-size:8px;color:var(--cinza)">${esc2(s.cod||'')}</td>
          <td style="${nm}">${esc2(s.descricao||'')}</td>
          <td class="mono" style="font-size:9px;color:var(--cinza)">${esc2(s.unidade||s.un||'vb')}</td>
          <td class="r mono" style="color:var(--cinza)">${s.quantidade||1}</td>
          <td class="r mono" style="color:var(--cinza)">${valUnitDisplay}</td>
          <td style="text-align:center">${st}</td>
          <td style="text-align:right">
            <div style="display:flex;align-items:center;justify-content:flex-end;gap:5px">
              <div style="width:40px;height:2px;background:var(--linha);overflow:hidden"><div style="width:${pct}%;height:100%;background:${pct>=100?'var(--ok)':'var(--preto)'}"></div></div>
              <span class="mono" style="font-size:9px${stText==='A EXECUTAR'?';color:var(--cinza)':''}">${pct>0?pct+'%':'—'}</span>
            </div>
          </td>
          <td class="r mono" style="${vl}">${valTotalDisplay}</td>
        </tr>`;
      });

      // Category subtotal
      srvRows += `<tr style="border-bottom:2px solid var(--preto)">
        <td colspan="7" style="text-align:right;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--cinza);text-transform:uppercase;letter-spacing:.5px;padding:4px 10px">Subtotal ${esc2(cat)}</td>
        <td class="r mono" style="font-size:11px;font-weight:700;padding:4px 10px;color:var(--texto)">R$ ${fmtNum(catTotal)}</td>
      </tr>`;
    });
  }

  // Totais finais
  const taxaValor = totalOrc * taxaAdm / 100;
  const totalComTaxa = totalOrc + taxaValor;

  const cabHeader = buildBertiHeader({
    tipo: 'Orçamento Detalhado',
    obra: c.obra || 'Obra',
    end: esc2(c.endereco_obra || ''),
    campos: [
      {l:'Contratante', v: esc2(c.razao_cliente||c.cliente||'—'), s: c.cnpj_cliente?`CNPJ ${esc2(c.cnpj_cliente)}`:''},
      {l:'Valor do Contrato', v: `R$ ${fmtNum(valContrato)}`},
      {l:`Taxa ADM`, v: `${taxaAdm}% — R$ ${fmtNum(taxaValor)}`},
      {l:'Vigência', v: `${pi||'—'} a ${pf||'—'}`}
    ]
  });

  const body = `${getBertiCSS(p1,p2)}<body>
<div class="doc">
${cabHeader}

// MEDIÇÃO FORMAL — padrão BERTI
// ═══════════════════════════════════════════════════════════════
function abrirMedicaoFormal(){
  const c = state.config;
  const t = getRelTema();
  const p1 = t.p1, p2 = t.p2;
  const pi = c.periodo_ini ? fmtDate(c.periodo_ini) : '';
  const pf = c.periodo_fim ? fmtDate(c.periodo_fim) : '';
  const periodo = pi && pf ? `${pi} a ${pf}` : (pi||'—');
  const srvs = state.servicos || [];
  const semana = c.semana || 1;
  const totalMed = c.medicoes || 7;
  const valContrato = c.valor_contrato || srvs.reduce((a,s)=>a+(s.valor||0),0);
  const taxaAdm = c.taxa_admin || 15;
  const valAdm = valContrato * taxaAdm / 100;

  // Serviços medidos = com delta esta semana
  const medidos = srvs.filter(s=>(s.pct_atual||0)>(s.pct_anterior||0));
  const totalMedicao = medidos.reduce((a,s)=>{
    const delta = (s.pct_atual||0)-(s.pct_anterior||0);
    return a + (s.valor||0)*delta/100;
  },0);

  // Acumulado total
  const totalAcum = srvs.reduce((a,s)=>a+(s.valor||0)*(s.pct_atual||0)/100,0);
  const saldoMedir = valContrato - totalAcum;

  const medRows = medidos.length ? medidos.map(s=>{
    const delta = (s.pct_atual||0)-(s.pct_anterior||0);
    const vlMedido = (s.valor||0)*delta/100;
    return `<tr>
      <td class="mono" style="font-size:8px;color:var(--cinza)">${esc2(s.cod||'')}</td>
      <td style="font-weight:700">${esc2(s.descricao||'')}</td>
      <td class="mono" style="font-size:9px;color:var(--cinza)">${esc2(s.unidade||s.un||'vb')}</td>
      <td class="r mono">R$ ${fmtNum(s.valor||0)}</td>
      <td class="r mono" style="color:var(--cinza)">${s.pct_anterior||0}%</td>
      <td class="r mono" style="font-weight:700">${s.pct_atual||0}%</td>
      <td class="r mono" style="font-weight:700">R$ ${fmtNum(vlMedido)}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="7" style="color:var(--cinza);text-align:center;padding:20px">Nenhum serviço medido neste período</td></tr>`;

  // Pagamento das equipes (agrupado por equipe dos serviços medidos)
  const _pagEquipes = {};
  medidos.forEach(function(s){
    var eqCod = s.equipe || s.equipe_cod || 'SEM_EQUIPE';
    var eq = state.equipes.find(function(e){ return e.cod === eqCod; });
    var nomeEq = eq ? (eq.nome || eq.responsavel || eqCod) : eqCod;
    var pixEq = eq ? (eq.pix || '') : '';
    var delta = (s.pct_atual||0) - (s.pct_anterior||0);
    var vlr = (s.valor||0) * delta / 100;
    if(!_pagEquipes[eqCod]) _pagEquipes[eqCod] = { nome: nomeEq, pix: pixEq, total: 0 };
    _pagEquipes[eqCod].total += vlr;
  });
  const _pagEqHtml = Object.values(_pagEquipes).filter(function(e){ return e.total > 0; }).map(function(e){
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border:1.5px solid var(--bord,#e5e0d8);border-radius:8px;margin-bottom:8px"><div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--tit,#111);margin-bottom:3px">'+esc2(e.nome)+'</div>'+(e.pix?'<div style="font-size:11px;color:var(--cinza,#888);font-family:monospace">PIX: <span style="color:var(--tit,#111);font-weight:600">'+esc2(e.pix)+'</span></div>':'<div style="font-size:11px;color:var(--cinza,#888)">PIX não cadastrado</div>')+'</div><div style="font-size:16px;font-weight:800;color:var(--ok,#065F46);font-family:monospace">R$ '+fmtNum(e.total)+'</div></div>';
  }).join('');

  const cabHeader = buildBertiHeader({
    tipo: `Boletim de Medição · Nº ${String(semana).padStart(2,'0')} de ${String(totalMed).padStart(2,'0')}`,
    obra: c.obra || 'Obra',
    end: esc2(c.endereco_obra || ''),
    campos: [
      {l:'Contratante', v: esc2(c.razao_cliente||c.cliente||'—'), s: c.cnpj_cliente?`CNPJ ${esc2(c.cnpj_cliente)}`:(c.telefone_cliente?`Tel. ${esc2(c.telefone_cliente)}`:'' )},
      {l:'Contratada', v: esc2(c.empresa||'Berti Construtora LTDA'), s: c.email_empresa?esc2(c.email_empresa):''},
      {l:'Período · Emissão', v: `${periodo} · ${today()}`},
      {l:'Contrato Total · Taxa ADM', v: `R$ ${fmtNum(valContrato)} · ${taxaAdm}% (R$ ${fmtNum(valAdm)})`}
    ]
  });

  const body = `${getBertiCSS(p1,p2)}<body>
<div class="doc">
${cabHeader}
<div class="corpo" style="padding:24px 32px 48px">
  <div class="secm">Serviços Medidos neste Período</div>
  <table class="tmed">
    <thead><tr><th>Cód.</th><th>Descrição do Serviço</th><th>Un.</th><th class="r">Vlr. Contrat.</th><th class="r">% Ant.</th><th class="r">% Atual</th><th class="r">Vlr. Medido</th></tr></thead>
    <tbody>${medRows}</tbody>
    <tfoot><tr>
      <td colspan="6" style="background:var(--preto);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase">Total desta Medição</td>
      <td class="r mono" style="background:var(--preto);color:#6EE7A0;font-size:13px;font-weight:700">R$ ${fmtNum(totalMedicao)}</td>
    </tr></tfoot>
  </table>

  <div class="secm" style="margin-top:20px">Resumo Financeiro</div>
  <div class="mres">
    <div class="mri">
      <div class="mrl">Valor desta medição</div>
      <div class="mrv dest">R$ ${fmtNum(totalMedicao)}</div>
      <div class="mono" style="font-size:8px;color:var(--cinza);margin-top:3px">${valContrato>0?Math.round(totalMedicao/valContrato*100):0}% do contrato</div>
      <div class="mpb"><div class="mpf" style="width:${valContrato>0?Math.min(100,Math.round(totalMedicao/valContrato*100)):0}%"></div></div>
    </div>
    <div class="mri">
      <div class="mrl">Total acumulado medido</div>
      <div class="mrv">R$ ${fmtNum(totalAcum)}</div>
      <div class="mono" style="font-size:8px;color:var(--cinza);margin-top:3px">Medição ${semana} de ${totalMed}</div>
    </div>
    <div class="mri">
      <div class="mrl">Saldo a medir</div>
      <div class="mrv">R$ ${fmtNum(Math.max(0,saldoMedir))}</div>
      <div class="mono" style="font-size:8px;color:var(--cinza);margin-top:3px">${valContrato>0?Math.round(Math.max(0,saldoMedir)/valContrato*100):0}% restante</div>
    </div>
  </div>

  ${_pagEqHtml ? `<div class="secm" style="margin-top:20px">Pagamento das Equipes</div>${_pagEqHtml}` : ''}
</div>
<div class="rdp">
  <div class="rdp-l">${esc2(c.empresa||'Berti Construtora LTDA')} · ${esc2(c.email_empresa||'')}</div>
  <div class="rdp-c">${esc2(c.obra||'')} · Medição ${semana}/${totalMed}</div>
  <div class="rdp-r">${today()} · ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>
</div>
</div></body>`;

  abrirModalRel(`Medição Formal Nº ${semana} — ${c.obra||''}`, body);
}

// ── Publicar portal via Apps Script (link permanente) ──────────────────
async function publicarPortalViaScript(btnEl) {
  const scriptUrl = getSyncScript();
  if (!scriptUrl) {
    toast('Configure o URL do Apps Script em Configurações → Sincronização', 'warning');
    return;
  }
  const c = state.config;
  const html = _buildPortalCliente();
  if (!html) return;

  const apelido  = slugify(c.razao_cliente||c.cliente||'cliente');
  const filename = `Portal_${apelido}.html`;  // nome FIXO — sem semana
  const folderId = extractDriveFolderId(c.link_drive || '');

  // UI — loading
  if (btnEl) { btnEl.disabled=true; btnEl.textContent='⏳ Publicando…'; }
  const statusEl = document.getElementById('pub-status');
  if (statusEl) { statusEl.style.display='flex'; statusEl.dataset.state='loading'; statusEl.innerHTML='<span style="font-size:16px">⏳</span><span>Enviando portal para o Drive via Apps Script…</span>'; }

  try {
    const payload = {
      action: 'publish_portal',
      obra: c.obra || apelido,
      html: html,
      filename: filename,
      folder_id: folderId || ''
    };
    const resp = await fetch(scriptUrl, {
      method: 'POST',
      body: JSON.stringify(payload),
      headers: { 'Content-Type': 'application/json' }
    });
    const data = await resp.json();

    if (data.ok) {
      state.config.link_portal = data.url;
      saveConfig();
      const el = document.getElementById('cfg-link-portal');
      if (el) el.value = data.url;
      toast('✅ Portal publicado! Link permanente salvo.', 'success');
      if (statusEl) {
        statusEl.dataset.state='ok';
        statusEl.innerHTML=`<span style="font-size:16px">✅</span><div><div style="font-weight:700;color:#065F46">Portal publicado com sucesso!</div><div style="font-size:10px;color:#047857;margin-top:2px;word-break:break-all">${esc(data.url)}</div><div style="font-size:10px;color:#6B7280;margin-top:1px">${esc(data.ts||'')} — qualquer nova publicação substituirá este arquivo mantendo o mesmo link</div></div>`;
      }
      if (btnEl) { btnEl.disabled=false; btnEl.textContent='☁️ Publicar no Drive via Script'; }
      // Refresh modal buttons
      document.getElementById('lnk-status-box')?.remove();
      document.getElementById('lnk-wa-box')?.remove();
    } else {
      throw new Error(data.msg || 'Erro desconhecido');
    }
  } catch(e) {
    if (statusEl) {
      statusEl.dataset.state='err';
      statusEl.innerHTML=`<span style="font-size:16px">❌</span><div><div style="font-weight:700;color:#991B1B">Falha ao publicar</div><div style="font-size:10px;color:#DC2626;margin-top:2px">${esc(e.message)}</div><div style="font-size:10px;color:#6B7280;margin-top:3px">Verifique se o Apps Script está implantado como App da Web com acesso "Qualquer pessoa"</div></div>`;
    }
    if (btnEl) { btnEl.disabled=false; btnEl.textContent='☁️ Tentar novamente'; }
    toast('Erro ao publicar: ' + e.message, 'error');
  }
}

function extractDriveFolderId(url) {
  if (!url) return '';
  const m = url.match(/\/folders\/([a-zA-Z0-9_-]+)/);
  return m ? m[1] : '';
}

// ── v48-cloud: Índice de obras — SUPABASE como fonte única ────────────
// localStorage é apenas cache offline. Nuvem é a verdade.
function getObrasIndex(){
  // Fallback offline: ler do cache local
  var keys = Object.keys(localStorage).filter(function(k){ return k.startsWith('cockpit_'); });
  var obras = [];
  keys.forEach(function(k){
    try {
      var d = JSON.parse(localStorage.getItem(k));
      if(d && d.config){
        var c2 = d.config;
        var srvs = d.servicos || [];
        var totalVal = srvs.reduce(function(a,s){ return a+(s.valor||0); }, 0);
        var pct = 0;
        if(totalVal > 0) pct = srvs.reduce(function(a,s){ return a+(s.pct_atual||0)*(s.valor||0); }, 0) / totalVal;
        else if(srvs.length > 0) pct = srvs.reduce(function(a,s){ return a+(s.pct_atual||0); }, 0) / srvs.length;
        obras.push({ key:k, nome:c2.obra||'Sem nome', cliente:c2.razao_cliente||c2.cliente||'', semana:c2.semana||1, servicos:srvs.length, pct:Math.round(pct), local:true });
      }
    } catch(e){}
  });
  return obras;
}

// v48-cloud: Carrega índice direto do Supabase
async function getObrasCloud(){
  try{
    var rows = await sbListarObrasCompletas();
    return rows.map(function(row){
      var d = {};
      try{ d = typeof row.data==='string'?JSON.parse(row.data):(row.data||{}); }catch(e){}
      var cfg = d.config||{};
      var srvs = Array.isArray(d.servicos)?d.servicos:[];
      var totalVal = srvs.reduce(function(a,s){return a+(s.valor||0);},0);
      var pct = 0;
      if(srvs.length){
        if(totalVal>0) pct = Math.round(srvs.reduce(function(a,s){return a+(s.pct_atual||0)*(s.valor||0);},0)/totalVal);
        else pct = Math.round(srvs.reduce(function(a,s){return a+(s.pct_atual||0);},0)/srvs.length);
      }
      return {
        key:'cockpit_'+row.obra_key, obra_key:row.obra_key,
        nome:cfg.obra||row.obra_key||'Sem nome', cliente:cfg.razao_cliente||cfg.cliente||'',
        semana:cfg.semana||1, servicos:srvs.length, pct:pct,
        updated:row.updated_at, cloud:true
      };
    });
  }catch(e){
    console.warn('Cloud offline, usando cache local');
    return null; // null = offline
  }
}

// v48-cloud: Lista obras com dados resumidos do Supabase
async function sbListarObrasCompletas(){
  var r = await fetch(
    SB_URL+'/rest/v1/'+SB_TABLE+'?select=obra_key,data,updated_at&order=updated_at.desc',
    {headers:sbHeaders(), signal:AbortSignal.timeout(12000)}
  );
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

async function renderObraSelector(){
  var el = document.getElementById('os-lista');
  if(!el) return;
  // Mostrar loading
  el.innerHTML = '<div style="text-align:center;padding:24px;color:var(--muted)"><div style="font-size:20px;margin-bottom:8px">☁</div>Carregando obras da nuvem...</div>';
  // Remover aviso antigo de nuvem
  var avisoOld = document.getElementById('os-cloud-aviso');
  if(avisoOld) avisoOld.remove();

  // CLOUD FIRST
  var obras = await getObrasCloud();
  var isOnline = obras !== null;

  if(!isOnline){
    // Offline: fallback localStorage
    obras = getObrasIndex();
    var offBanner = document.createElement('div');
    offBanner.style.cssText = 'background:#FEF3C7;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:#92400E;display:flex;align-items:center;gap:8px';
    offBanner.innerHTML = '⚠ <b>Offline</b> — mostrando última versão salva. Conecte-se para ver dados atualizados.';
    el.parentNode.insertBefore(offBanner, el);
  } else {
    // Online: sincronizar cache local com nuvem (manter apenas as que existem na nuvem)
    var cloudKeys = obras.map(function(o){return o.key;});
    Object.keys(localStorage).filter(function(k){return k.startsWith('cockpit_');}).forEach(function(k){
      if(!cloudKeys.includes(k)){
        // Obra local que NÃO existe na nuvem → remover cache velho
        // (preservar se foi criada recentemente e ainda não sincronizou)
        try{
          var d=JSON.parse(localStorage.getItem(k));
          if(d && d._savedAt){
            var age=(Date.now()-new Date(d._savedAt).getTime())/86400000;
            if(age>1) localStorage.removeItem(k); // mais de 1 dia → lixo
          } else { localStorage.removeItem(k); }
        }catch(e){ localStorage.removeItem(k); }
      }
    });
  }

  // Empresa/logo
  var empresaName = localStorage.getItem('mdo_empresa_name');
  var logoEl = document.getElementById('os-logo-text');
  if(logoEl && empresaName) logoEl.innerHTML = esc(empresaName) + '<span>.</span>';

  // Info
  var infoEl = document.getElementById('os-backup-info');
  if(infoEl) infoEl.textContent = obras.length + ' obra'+(obras.length!==1?'s':'')+' na nuvem'+(isOnline?' ✓':' (offline)');

  if(!obras.length){
    el.innerHTML = '<div style="background:linear-gradient(135deg,var(--primary) 0%,#1a3d28 100%);border-radius:12px;padding:24px 20px 20px;margin-bottom:14px;text-align:center"><div style="font-family:var(--font-display);font-size:20px;font-weight:800;color:#fff;margin-bottom:12px">Bem-vindo ao Mestre de Obra</div><div style="display:flex;flex-direction:column;gap:10px;margin-top:12px"><button onclick="criarNovaObra()" style="background:var(--gold);color:var(--primary);border:none;border-radius:8px;padding:13px 20px;font-family:var(--font-display);font-size:14px;font-weight:800;cursor:pointer">+ Criar primeira obra</button></div></div>';
    return;
  }

  // Renderizar cards — cada card vem da nuvem
  el.innerHTML = obras.map(function(o){
    var k = esc(o.key), n = esc(o.nome), cl = esc(o.cliente);
    var ts = o.updated ? new Date(o.updated).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
    return '<div class="os-card" onclick="selecionarObra(&quot;'+k+'&quot;)">'
      + '<div class="os-card-icon">&#127959;</div>'
      + '<div class="os-card-info">'
      + '<div class="os-card-nome">'+n+'</div>'
      + '<div class="os-card-meta">'+cl+' &middot; Sem '+o.semana+' &middot; '+o.servicos+' srv'+(ts?' &middot; <span style="color:var(--accent);font-size:9px">☁ '+ts+'</span>':'')+'</div>'
      + '</div>'
      + '<div class="os-card-pct">'+o.pct+'%</div>'
      + '</div>';
  }).join('');
}

function selecionarObra(key){
  var obraKey = key.replace('cockpit_','');
  // v48-cloud: SEMPRE carregar da nuvem primeiro
  toast('☁ Carregando obra...','info');
  sbLoad(obraKey).then(function(remoto){
    if(remoto && remoto.data){
      state = migrateState(remoto.data);
      sanitizeState(state);
      currentObraKey = key.startsWith('cockpit_') ? key : 'cockpit_'+obraKey;
      // Atualizar cache local
      localStorage.setItem(currentObraKey, JSON.stringify(state));
      restoreUI();
      renderAll();
      hideObraSelector();
      if(typeof renderCronograma==='function') try{renderCronograma();}catch(e){}
      if(typeof renderDrawer==='function') try{renderDrawer();}catch(e){}
      if(typeof atualizarBadgesAbas==='function') setTimeout(function(){ try{atualizarBadgesAbas();}catch(e){}},100);
      sbAtualizarIndicador('ok');
      toast('☁ '+state.config.obra+' — dados atualizados','success');
    } else {
      // Nuvem vazia ou offline → fallback localStorage
      if(loadState(key)){
        hideObraSelector();
        if(typeof renderCronograma==='function') try{renderCronograma();}catch(e){}
        if(typeof renderDrawer==='function') try{renderDrawer();}catch(e){}
        if(typeof atualizarBadgesAbas==='function') setTimeout(function(){ try{atualizarBadgesAbas();}catch(e){}},100);
        toast('⚠ Offline — usando versão local de '+state.config.obra,'warning');
      } else {
        toast('Obra não encontrada','error');
      }
    }
  }).catch(function(){
    // Sem conexão → fallback localStorage
    if(loadState(key)){
      hideObraSelector();
      if(typeof renderCronograma==='function') try{renderCronograma();}catch(e){}
      if(typeof renderDrawer==='function') try{renderDrawer();}catch(e){}
      if(typeof atualizarBadgesAbas==='function') setTimeout(function(){ try{atualizarBadgesAbas();}catch(e){}},100);
      toast('⚠ Offline — usando cache local','warning');
    } else {
      toast('Sem conexão e sem dados locais','error');
    }
  });
}

function backupTudo(){
  const obras = getObrasIndex();
  const backup = { version:1, data:{}, ts:new Date().toISOString() };
  obras.forEach(o=>{
    try{ backup.data[o.key] = JSON.parse(localStorage.getItem(o.key)||'{}'); }catch(e){}
  });
  // Incluir configurações globais (API keys)
  ['apiKey','imgbbKey','gscriptUrl','masterUrl','baseDadosId','bdScriptUrl'].forEach(k=>{
    const v = localStorage.getItem(k);
    if(v) backup.data['__global_'+k] = v;
  });
  const blob = new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const dt   = new Date().toISOString().slice(0,10).replace(/-/g,'');
  a.href = url; a.download = `MestreObra_Backup_${dt}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  const info = document.getElementById('os-backup-info');
  if(info) info.textContent = `Backup de ${obras.length} obra(s) baixado — ${dt}`;
  toast(`Backup de ${obras.length} obra(s) gerado`,'success');

// ── Restaurar backup ────────────────────────────────────────────────────
function restaurarBackup(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const backup = JSON.parse(e.target.result);
      if(!backup.data){ toast('Arquivo inválido','error'); return; }
      let count = 0;
      Object.entries(backup.data).forEach(([key,val])=>{
        if(key.startsWith('__global_')){
          const k = key.replace('__global_','');
          if(typeof val === 'string') localStorage.setItem(k, val);
        } else {
          localStorage.setItem(key, typeof val==='string'?val:JSON.stringify(val));
          count++;
        }
      });
      const info = document.getElementById('os-backup-info');
      if(info) info.textContent = `${count} obra(s) restaurada(s)`;
      toast(`${count} obra(s) restaurada(s) com sucesso`,'success');
    }catch(err){
      toast('Erro ao restaurar: '+err.message,'error');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

// PDF GENERATION ENGINE — html2pdf.js

var _relCurrentHtml = '';
var _relCurrentTitle = '';

function _pdfFilename(tipo){
  var c = state.config || {};
  var obra = (c.obra||'obra').replace(/[^a-z0-9]/gi,'_').toLowerCase();
  var sem = String(c.semana||1).padStart(2,'0');
  var tipoSlug = (tipo||'relatorio').replace(/[^a-z0-9]/gi,'_').toLowerCase();
  return obra + '_' + tipoSlug + '_sem' + sem + '.pdf';
}

function _pdfOpts(filename){
  return {
    margin: [2, 0, 2, 0],
    filename: filename,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false, allowTaint: true, letterRendering: true, scrollX: 0, scrollY: 0 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
  };
}

function gerarPDFdoRelatorio(){
  if(!_relCurrentHtml){ toast('Nenhum relatório aberto','info'); return; }
  toast('Abrindo para salvar como PDF...','info');
  _imprimirHTML(_relCurrentHtml, _relCurrentTitle);
}

  // Legacy - não mais usado
}

function gerarPDFdoHTML(htmlContent, filename){
  // Para ZIP: gera via html2pdf se disponível, senão retorna HTML
  return new Promise(function(resolve, reject){
    if(typeof html2pdf === 'undefined') return reject(new Error('html2pdf não disponível'));
    var container = document.createElement('div');
    // Posiciona fora da tela mas VISÍVEL (html2canvas exige visibilidade)
    container.style.cssText = 'position:fixed;left:0;top:0;width:794px;background:#fff;z-index:99999';
    container.innerHTML = htmlContent;
    document.body.appendChild(container);
    setTimeout(function(){
      html2pdf().set(_pdfOpts(filename)).from(container).outputPdf('blob').then(function(blob){
        document.body.removeChild(container);
        resolve(blob);
      }).catch(function(e){
        document.body.removeChild(container);
        reject(e);
      });
    }, 1200);
  });
}

// Abre o relatório num popup/iframe para impressão nativa (Ctrl+P → Salvar como PDF)
function _imprimirHTML(htmlContent, titulo){
  var fullDoc = '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>'+(titulo||'Relatório')+'</title>'+htmlContent+'</head></html>';
  var win = window.open('', '_blank', 'width=860,height=900');
  if(!win){
    toast('Permita pop-ups para gerar o PDF','error');
    return;
  }
  win.document.open();
  win.document.write(fullDoc);
  win.document.close();
  // Aguarda fontes e layout, depois abre diálogo de impressão
  setTimeout(function(){
    win.focus();
    win.print();
  }, 1500);
}

.sl-r{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid #f0f0f0;font-size:12px}
.sl-r:last-child{border-bottom:none}
.sl-r:nth-child(even){background:var(--bg)}
.sl-cod{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--sub);min-width:55px}
.sl-nm{flex:1;font-weight:600;color:var(--ink)}
.sl-pct{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700}
.sl-st{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px}
.st-ok{background:#E8F5E9;color:#2E7D32}.st-and{background:#E3F2FD;color:#1565C0}.st-ex{background:#F5F5F5;color:#999}

/* PROGRESS BAR */
.pbar{height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-top:8px}
.pfill{height:100%;background:var(--p1);border-radius:2px;transition:width .4s ease}

/* FIN BAND */
.fin-band{background:var(--p1);display:grid;grid-template-columns:repeat(4,1fr);border-radius:10px;overflow:hidden;margin-bottom:20px}
.fb{padding:16px 18px}
.fb-l{font-family:'IBM Plex Mono',monospace;font-size:7px;color:rgba(255,255,255,.25);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.fb-v{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:#fff;line-height:1}
.fb-v.g{color:#6EE7A0}.fb-v.a{color:#FCD34D}
.fb-s{font-size:9px;color:rgba(255,255,255,.18);margin-top:3px}

/* ORÇAMENTO */
.orc-cat{border:1px solid var(--line);border-radius:8px;margin-bottom:8px;overflow:hidden;cursor:pointer;transition:box-shadow .2s}
.orc-cat:hover{box-shadow:0 2px 12px rgba(0,0,0,.04)}
.orc-cat-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.orc-cat-nm{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--ink);flex:1}
.orc-cat-meta{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--sub)}
.orc-cat-val{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--ink)}
.orc-bar{width:60px;height:5px;background:var(--line);border-radius:3px;overflow:hidden}
.orc-fill{height:100%;background:var(--p2);border-radius:3px}
.orc-cat-pct{font-family:'IBM Plex Mono',monospace;font-weight:700;min-width:30px;text-align:right}
.orc-chev{color:var(--sub);font-size:10px;transition:transform .2s}
.orc-det{background:var(--bg)}

/* GANTT FILTER */
.gf{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.gf-btn{padding:6px 14px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border:1.5px solid var(--line);border-radius:6px;background:var(--surface);color:var(--sub);cursor:pointer;transition:all .15s}
.gf-btn:hover{border-color:var(--p1);color:var(--p1)}
.gf-btn.on{background:var(--p1);color:#fff;border-color:var(--p1)}

/* FOTOS */
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.foto-card{border-radius:8px;overflow:hidden;border:1px solid var(--line);background:var(--surface);transition:box-shadow .2s}
.foto-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}
.foto-card img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
.foto-info{padding:6px 10px}
.foto-leg{font-size:10px;font-weight:600;color:var(--ink);line-height:1.3}
.foto-dt{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--sub);margin-top:2px}

/* LINKS */
.lg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.lk{display:flex;align-items:center;gap:8px;padding:12px 16px;border:1px solid var(--line);border-radius:8px;font-size:12px;font-weight:600;transition:all .15s}
.lk:hover{background:var(--bg);border-color:var(--p2)}

/* FOOTER */
.ftr{background:var(--p1);padding:24px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.ftr-l{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:#fff}
.ftr-m{font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,.2);line-height:1.6}
.wa-btn{display:inline-flex;align-items:center;gap:6px;background:#25D366;color:#fff;padding:8px 18px;border-radius:6px;font-size:11px;font-weight:700}

/* PRÓXIMOS SERVIÇOS */
.prox-filter{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.prox-filter label{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px}
.prox-filter input[type=date]{font-family:'Barlow',sans-serif;font-size:12px;padding:5px 10px;border:1.5px solid var(--line);border-radius:6px;background:var(--surface);color:var(--ink)}

@media(max-width:640px){
  .hdr{padding:20px 18px 16px}
  .pnl{padding:18px 16px 32px}
  .dash{grid-template-columns:1fr;gap:14px}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .fin-band{grid-template-columns:repeat(2,1fr)}
  .fg{grid-template-columns:repeat(2,1fr)}
  .tab{padding:9px 14px;font-size:11px}
}
@media print{

  .pnl{display:block!important;padding:20px 24px!important;page-break-inside:avoid}
  .pnl+.pnl{border-top:2px solid var(--p1);margin-top:0}
  .wrap{max-width:100%!important;box-shadow:none!important}
  .ftr{page-break-before:always}
  .gf{display:none!important}
  .foto-card{break-inside:avoid}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
  body{background:#fff!important}
}

@media print{.print-divider{display:block!important}}

var P1='${p1}';
function _e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function T(n){document.querySelectorAll('.pnl').forEach(function(p){p.classList.remove('on')});document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on')});var p=document.getElementById('P'+n);if(p)p.classList.add('on');document.querySelectorAll('.tab')[n].classList.add('on');window.scrollTo(0,0);}

function exportPDF(){

function toggleCat(i){var el=document.getElementById('det-'+i);var ch=document.getElementById('chev-'+i);if(el.style.display==='none'){el.style.display='block';ch.textContent='▾';}else{el.style.display='none';ch.textContent='▸';}}

// ── PRÓXIMOS SERVIÇOS — cálculo automático pela data da obra ──
var OBRA_INI='${c.periodo_ini||''}';
var OBRA_SEM=${semana};

function calcProxSemana(){
  // Calcula próxima semana baseado em: data_inicio_obra + (semana_atual) * 7 dias
  var ini,fim;
  if(OBRA_INI){
    var base=new Date(OBRA_INI.includes('/')?OBRA_INI.split('/').reverse().join('-'):OBRA_INI);
    if(!isNaN(base)){
      base.setHours(0,0,0,0);
      // Semana atual da obra = OBRA_SEM, próxima = +1
      ini=new Date(base.getTime()+(OBRA_SEM)*7*86400000);
      fim=new Date(ini.getTime()+6*86400000);
    }
  }
  if(!ini){
    // Fallback: próxima segunda do calendário
    var h=new Date();h.setHours(0,0,0,0);
    var dw=h.getDay();var ds=dw===0?1:(8-dw);
    ini=new Date(h);ini.setDate(h.getDate()+ds);
    fim=new Date(ini);fim.setDate(ini.getDate()+6);
  }
  return {ini:ini,fim:fim};
}

function renderProx(){
  var r=calcProxSemana();
  var iniISO=r.ini.toISOString().slice(0,10);

function renderGantt(){
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var dow=hoje.getDay();var dSeg=dow===0?-6:1-dow;
  var rangeIni,rangeFim;
  if(_gMode==='2sem'){rangeIni=new Date(hoje);rangeIni.setDate(hoje.getDate()+dSeg);rangeFim=new Date(rangeIni);rangeFim.setDate(rangeIni.getDate()+13);}
  else if(_gMode==='mes'){rangeIni=new Date(hoje.getFullYear(),hoje.getMonth(),1);rangeFim=new Date(hoje.getFullYear(),hoje.getMonth()+1,0);}
  else{var aI=SRVS.map(function(s){return s.dm&&s.dm.length?s.dm[0]:s.di;}).filter(Boolean).sort();var aF=SRVS.map(function(s){return s.dm&&s.dm.length?s.dm[s.dm.length-1]:s.df;}).filter(Boolean).sort();rangeIni=aI.length?new Date(aI[0]):new Date();rangeFim=aF.length?new Date(aF[aF.length-1]):new Date();}
  rangeIni.setHours(0,0,0,0);rangeFim.setHours(0,0,0,0);

  var dias=[],cur=new Date(rangeIni);while(cur<=rangeFim){dias.push(new Date(cur));cur.setDate(cur.getDate()+1);}
  if(!dias.length)dias.push(new Date());

  // Ajusta largura das colunas ao filtro — menos dias = mais espaço
  var colW=dias.length<=14?28:dias.length<=31?22:18;

  var dowL=['D','S','T','Q','Q','S','S'];
  var meses=[],pM=-1;
  dias.forEach(function(d){var m=d.getMonth();if(m!==pM){meses.push({l:d.toLocaleDateString('pt-BR',{month:'short'}).toUpperCase(),c:0});pM=m;}meses[meses.length-1].c++;});
  var monH=meses.map(function(m){return '<th colspan="'+m.c+'" style="padding:3px;text-align:center;font-size:7px;font-weight:700;color:#888;background:#f5f5f5;border-left:1px solid #ddd">'+m.l+'</th>';}).join('');
  var dayH=dias.map(function(d){var t=d.getTime()===hoje.getTime();var w=d.getDay()===0||d.getDay()===6;return '<th style="min-width:'+colW+'px;max-width:'+colW+'px;padding:2px;text-align:center;font-size:'+(colW>=24?'7':'6')+'px;font-weight:600;background:'+(t?P1:w?'#eee':'#fafafa')+';color:'+(t?'#fff':'#aaa')+';border-left:1px solid #e8e8e8;line-height:1.1">'+dowL[d.getDay()]+'<br>'+d.getDate()+'</th>';}).join('');

  var riISO=rangeIni.toISOString().slice(0,10),rfISO=rangeFim.toISOString().slice(0,10);
  var filtered=(_gMode==='total')?SRVS:SRVS.filter(function(s){
    if(s.dm&&s.dm.length)return s.dm.some(function(d){return d>=riISO&&d<=rfISO;});
    return s.di&&s.di<=rfISO&&(s.df||s.di)>=riISO;
  });

  var rows=filtered.map(function(s,ri){
    var pct=s.pct||0;var at=(s.df&&new Date(s.df)<hoje&&pct<100);
    var eqC='#E0E0E0';EQS.forEach(function(e){if(e.cod===s.eq)eqC=e.cor;});
    var bc=at?'#EF9A9A':eqC;var rb=ri%2===0?'#fff':'#fafbfc';
    var cells=dias.map(function(d){var dI=d.toISOString().slice(0,10);var inR=false;if(s.dm&&s.dm.length){inR=s.dm.indexOf(dI)>=0;}else{var ini=s.di?new Date(s.di):null;var fim=s.df?new Date(s.df):ini;if(ini){ini.setHours(0,0,0,0);if(fim)fim.setHours(0,0,0,0);inR=d>=ini&&d<=(fim||ini);}}var bg=inR?bc:(d.getDay()===0||d.getDay()===6?'#f7f6f3':rb);var bL=d.getTime()===hoje.getTime()?'border-left:2px solid '+P1:'border-left:1px solid #e8e8e8';return '<td style="padding:0;height:'+Math.max(18,colW-4)+'px;'+bL+';background:'+bg+'"></td>';}).join('');
    var stC=pct>=100?'#2E7D32':pct>0?'#1565C0':'#999';
    return '<tr style="border-bottom:1px solid #eee;background:'+rb+'"><td style="padding:4px 8px;min-width:180px;max-width:260px;white-space:normal;font-size:10px;font-weight:600;color:#333;border-right:1px solid #e0e0e0;background:'+rb+'">'+_e(s.d)+'</td><td style="padding:4px;text-align:center;font-size:9px;font-weight:700;color:'+stC+';border-right:1px solid #ccc;background:'+rb+'">'+pct+'%</td>'+cells+'</tr>';
  }).join('');

  document.getElementById('gantt-container').innerHTML='<table style="border-collapse:collapse;font-size:9px;width:max-content;border:1px solid #ccc"><thead><tr><th style="min-width:180px;background:#f5f5f5"></th><th style="min-width:36px;background:#f5f5f5"></th>'+monH+'</tr><tr><th style="padding:5px 8px;text-align:left;background:'+P1+';color:#fff;font-size:9px;font-weight:700">Serviço</th><th style="padding:5px;text-align:center;background:'+P1+';color:#fff;font-size:9px">%</th>'+dayH+'</tr></thead><tbody>'+rows+'</tbody></table>';
  document.getElementById('gantt-legend').innerHTML=EQS.map(function(e){return '<span style="display:inline-flex;align-items:center;gap:3px"><span style="display:inline-block;width:8px;height:8px;background:'+e.cor+';border-radius:2px"></span>'+_e(e.cod)+'</span>';}).join('')+'<span style="display:inline-flex;align-items:center;gap:3px;margin-left:8px"><span style="display:inline-block;width:8px;height:8px;background:#EF9A9A;border-radius:2px"></span>Atrasado</span><span style="display:inline-flex;align-items:center;gap:3px"><span style="display:inline-block;width:8px;height:8px;background:'+P1+';border-radius:2px"></span>Hoje</span>';
}

// Init
document.addEventListener('DOMContentLoaded',function(){
  renderProx();
  renderGantt();
});
<\/script>
</body></html>`;
}
